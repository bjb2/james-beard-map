<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Delectable</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FEA219;
      --orange-dim: rgba(254,162,25,0.15);
      --black: #0d0d0d;
      --black-mid: #141414;
      --black-light: #1c1c1c;
      --border: #2a2a2a;
      --border-light: #333;
      --white: #ffffff;
      --white-dim: rgba(255,255,255,0.6);
      --white-faint: rgba(255,255,255,0.25);
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      height: 36px; width: 36px; object-fit: contain; flex-shrink: 0;
    }

    .header-wordmark a {
      text-decoration: none;
      color: inherit;
    }

    .header-wordmark h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--white);
    }

    .header-divider {
      width: 1px;
      height: 28px;
      background: var(--border-light);
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--white-dim);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--white-dim); color: var(--white); }

    .btn-orange {
      background: var(--orange);
      border: 1px solid var(--orange);
      color: var(--black);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Layout ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Profile header ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--black-light);
      border: 2px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--white-dim);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-editable { cursor: pointer; position: relative; }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; align-items: center;
      justify-content: center; font-size: 1.1rem; opacity: 0;
      transition: opacity 0.15s; pointer-events: none;
    }
    .avatar-editable:hover .avatar-overlay { opacity: 1; }

    .profile-info h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .editable-name { cursor: pointer; }
    .editable-name:hover { opacity: 0.75; }
    .name-edit-input {
      font-size: 1.4rem; font-weight: 600; font-family: inherit;
      background: transparent; border: none;
      border-bottom: 1px solid var(--orange);
      color: var(--white); outline: none; width: 220px; max-width: 100%;
    }

    .profile-info .username {
      font-size: 0.78rem;
      color: var(--white-dim);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--black-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 0.68rem;
      color: var(--white-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--white-dim);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-count {
      font-size: 0.65rem;
      color: var(--white-faint);
      font-weight: 400;
    }

    /* ── Restaurant list ── */
    .rest-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .rest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--black-mid);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
    }

    .rest-item:hover { background: var(--black-light); }

    .rest-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
    }

    .rest-thumb-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .rest-info {
      flex: 1;
      min-width: 0;
    }

    .rest-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rest-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .rest-location {
      font-size: 0.72rem;
      color: var(--white-dim);
    }

    .rest-badge {
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .badge-winner   { background: rgba(254,162,25,0.18); color: var(--orange); }
    .badge-michelin { background: rgba(220,50,50,0.15); color: #e86; }
    .badge-nominee  { background: rgba(255,255,255,0.07); color: var(--white-dim); }

    .rest-date {
      font-size: 0.68rem;
      color: var(--white-faint);
    }

    .map-link {
      font-size: 0.72rem;
      color: var(--orange);
      text-decoration: none;
      flex-shrink: 0;
      opacity: 0.7;
      padding: 4px 10px;
      border: 1px solid rgba(254,162,25,0.3);
      border-radius: 6px;
      transition: opacity 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .map-link:hover { opacity: 1; border-color: var(--orange); }

    .remove-btn {
      background: transparent;
      border: none;
      color: var(--white-faint);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
      line-height: 1;
    }
    .remove-btn:hover { color: #e55; background: rgba(220,50,50,0.12); }
    .remove-btn:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 600px) {
      .rest-thumb, .rest-thumb-placeholder { width: 40px; height: 40px; }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--white-faint);
      font-size: 0.82rem;
    }

    /* ── Error / loading ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--white-dim);
      font-size: 0.85rem;
    }

    #error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--white-dim);
    }

    #error-msg h2 { margin-bottom: 12px; font-size: 1.2rem; }
    #error-msg p  { font-size: 0.82rem; color: var(--white-faint); }

    /* ── Own-profile edit ── */
    .edit-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .edit-input {
      background: var(--black-light);
      border: 1px solid var(--border-light);
      color: var(--white);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 5px 10px;
      border-radius: 6px;
      outline: none;
      min-width: 0;
      flex: 1;
    }
    .edit-input:focus { border-color: var(--orange); }

    /* ── Show more ── */
    .show-more-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: border-color 0.15s, color 0.15s;
    }
    .show-more-btn:hover { border-color: var(--white-dim); color: var(--white); }

    /* ── My Lists ── */
    .lists-section {}

    .list-row {
      background: var(--black-mid);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
    }

    .list-row-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .list-row-header:hover { background: var(--black-light); }

    .list-chevron {
      font-size: 0.65rem;
      color: var(--white-faint);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .list-row.expanded .list-chevron { transform: rotate(90deg); }

    .list-row-name {
      font-size: 0.88rem;
      font-weight: 500;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-row-count {
      font-size: 0.72rem;
      color: var(--white-faint);
      flex-shrink: 0;
    }

    .list-row-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .list-action-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 0.72rem;
      color: var(--white-faint);
      font-family: inherit;
      line-height: 1;
      transition: color 0.12s, background 0.12s;
    }
    .list-action-btn:hover { color: var(--white-dim); background: rgba(255,255,255,0.07); }
    .list-action-btn.delete:hover { color: #e55; background: rgba(220,50,50,0.12); }
    .list-action-btn.copied { color: var(--orange); }

    .visibility-pill {
      font-size: 0.62rem;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--border-light);
      color: var(--white-faint);
      cursor: pointer;
      font-family: inherit;
      background: transparent;
      transition: border-color 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .visibility-pill.public { border-color: rgba(254,162,25,0.4); color: var(--orange); }
    .visibility-pill:hover { border-color: var(--white-dim); color: var(--white-dim); }

    @media (max-width: 600px) {
      .list-row-header { flex-wrap: wrap; row-gap: 8px; padding: 10px 12px; }
      .list-row-name { min-width: 0; }
      .list-row-actions {
        flex-basis: 100%;
        padding-left: 18px;
        justify-content: flex-start;
        gap: 4px;
      }
    }

    .list-row-body {
      display: none;
      padding: 0 14px 12px;
      border-top: 1px solid var(--border);
    }
    .list-row.expanded .list-row-body { display: block; }

    .list-body-loading {
      padding: 16px 0;
      font-size: 0.8rem;
      color: var(--white-faint);
      text-align: center;
    }

    .list-compact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .list-compact-item:last-child { border-bottom: none; }

    .list-compact-photo {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--black-light);
    }
    .list-compact-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .list-compact-info { flex: 1; min-width: 0; }
    .list-compact-name {
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-compact-sub {
      font-size: 0.7rem;
      color: var(--white-dim);
      margin-top: 2px;
    }
    .list-compact-note {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      font-style: italic;
      margin-top: 2px;
    }

    .new-list-form {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .new-list-input {
      flex: 1;
      background: var(--black-light);
      border: 1px solid var(--border-light);
      color: var(--white);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      outline: none;
      min-width: 0;
    }
    .new-list-input:focus { border-color: var(--orange); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .page  { padding: 24px 16px 60px; }
      .rest-location { display: none; }
    }
  </style>
</head>
<body>

<header>
  <img src="/logo.png" class="header-logo" alt="">
  <div class="header-wordmark">
    <a href="/"><h1>Delectable</h1></a>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub">Profile</span>
  <div class="header-actions" id="header-actions">
    <!-- filled by JS -->
  </div>
</header>

<div class="page" id="page">
  <div class="loading" id="loading">Loading profile…</div>
  <div id="error-msg" style="display:none">
    <h2>Profile not found</h2>
    <p>This user doesn't exist or their profile is private.</p>
  </div>
  <div id="profile-content" style="display:none">
    <!-- filled by JS -->
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bnlnlfnrkwizviiabhex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubG5sZm5ya3dpenZpaWFiaGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTgxODgsImV4cCI6MjA5MTMzNDE4OH0.GW0-kcOrcQ8YXyqvI6LbDnLM1IIQTkL1FFajJUrkfHk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let profileUser = null;
let isOwnProfile = false;
let wtgListId = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function badgeHtml(summary) {
  if (!summary) return '';
  if (summary.startsWith('Michelin')) {
    return `<span class="rest-badge badge-michelin">${summary}</span>`;
  }
  if (summary.includes('Winner')) {
    return `<span class="rest-badge badge-winner">JBF Winner</span>`;
  }
  return `<span class="rest-badge badge-nominee">JBF</span>`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function mapUrl(restaurantKey) {
  const [name, city, stateOrCountry] = restaurantKey.split('|');
  const q = encodeURIComponent([name, city, stateOrCountry].filter(Boolean).join(' '));
  return `/?search=${q}`;
}

// ── Auth header ─────────────────────────────────────────────────────────────
function renderAuthHeader(user) {
  const el = document.getElementById('header-actions');
  if (user) {
    el.innerHTML = `<button class="btn-ghost" onclick="signOut()">Sign out</button>`;
  } else {
    el.innerHTML = `<button class="btn-orange" onclick="signIn()">Sign in</button>`;
  }
}

async function signIn() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  renderAuthHeader(null);
}

// ── Stats computation ────────────────────────────────────────────────────────
function computeStats(visits, wtgItems) {
  const stats = {
    visited: visits.length,
    wantToGo: wtgItems.length,
    locations: new Set(),
    michelinVisited: 0,
    jbfWinnersVisited: 0,
  };

  for (const v of visits) {
    const place = v.state || v.country;
    if (place) stats.locations.add(place);
    if (v.award_summary?.startsWith('Michelin')) stats.michelinVisited++;
    if (v.award_summary?.includes('Winner')) stats.jbfWinnersVisited++;
  }

  return {
    ...stats,
    locationCount: stats.locations.size,
  };
}

// ── Render ───────────────────────────────────────────────────────────────────
const PAGE_SIZE = 20;
// Store full item arrays keyed by list type for "show more"
const listData = {};

function renderList(items, type) {
  listData[type] = items;

  if (!items.length) {
    return `<div class="empty-state">Nothing here yet.</div>`;
  }

  const visible = items.slice(0, PAGE_SIZE);
  const hidden  = items.length - visible.length;

  let html = '<div class="rest-list" id="list-' + type + '">';
  for (const item of visible) {
    html += renderItem(item, type);
  }
  html += '</div>';

  if (hidden > 0) {
    html += `<button class="show-more-btn" id="show-more-${type}">Show ${hidden} more</button>`;
  }

  return html;
}

function renderItem(item, type) {
  const name     = item.name || item.restaurant_key.split('|')[0];
  const location = [item.city, item.state || item.country].filter(Boolean).join(', ');
  const summary  = item.award_summary || '';
  const date     = type === 'visited' ? item.visited_on : null;

  const key = encodeURIComponent(item.restaurant_key);
  let mapHref = `/?popup=${key}`;
  if (item.lat && item.lng) mapHref += `&lat=${item.lat}&lng=${item.lng}`;

  const thumbHtml = item.photo_url
    ? `<img class="rest-thumb" src="${escHtml(item.photo_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="rest-thumb-placeholder" style="display:none">🍽</div>`
    : `<div class="rest-thumb-placeholder">🍽</div>`;

  const removeBtn = (isOwnProfile && type === 'wantToGo')
    ? `<button class="remove-btn" onclick="removeWantToGo(this, '${key}')" title="Remove">✕</button>`
    : '';

  return `
    <div class="rest-item" data-key="${key}">
      ${thumbHtml}
      <div class="rest-info">
        <div class="rest-name">${escHtml(name)}</div>
        <div class="rest-meta">
          ${location ? `<span class="rest-location">${escHtml(location)}</span>` : ''}
          ${badgeHtml(summary)}
          ${date ? `<span class="rest-date">${formatDate(date)}</span>` : ''}
        </div>
      </div>
      <a class="map-link" href="${mapHref}">View on map</a>
      ${removeBtn}
    </div>`;
}

async function removeWantToGo(btn, encodedKey) {
  const restaurantKey = decodeURIComponent(encodedKey);
  btn.disabled = true;
  btn.textContent = '…';

  const { error } = await sb.from('list_items').delete()
    .eq('list_id', wtgListId).eq('restaurant_key', restaurantKey);

  if (error) { btn.disabled = false; btn.textContent = '✕'; return; }

  // Remove from DOM and local data
  const el = btn.closest('.rest-item');
  el.remove();
  listData['wantToGo'] = listData['wantToGo'].filter(i => i.restaurant_key !== restaurantKey);

  // Update stats count
  const countEl = document.querySelector('#section-wtg-count');
  if (countEl) countEl.textContent = listData['wantToGo'].length;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindShowMore(type) {
  const btn = document.getElementById('show-more-' + type);
  if (!btn) return;
  btn.addEventListener('click', () => {
    const container = document.getElementById('list-' + type);
    const currentCount = container.querySelectorAll('.rest-item').length;
    const items = listData[type];
    const next  = items.slice(currentCount, currentCount + PAGE_SIZE);
    const frag  = document.createElement('div');
    frag.innerHTML = next.map(i => renderItem(i, type)).join('');
    while (frag.firstChild) container.appendChild(frag.firstChild);
    const remaining = items.length - container.querySelectorAll('.rest-item').length;
    if (remaining <= 0) btn.remove();
    else btn.textContent = `Show ${remaining} more`;
  });
}

function renderProfile(profile, visits, wtgItems, customLists) {
  const stats = computeStats(visits, wtgItems);

  const displayName = profile.display_name || profile.username || 'Anonymous';

  const avatarImg = profile.avatar_url
    ? `<img src="${escHtml(profile.avatar_url)}" alt="avatar">`
    : `<span style="font-size:1.6rem;color:var(--white-dim);">👤</span>`;

  const avatarHtml = isOwnProfile
    ? `<div class="avatar avatar-editable" title="Change photo" onclick="document.getElementById('avatar-file-input').click()">
        ${avatarImg}
        <div class="avatar-overlay">📷</div>
       </div>
       <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">`
    : `<div class="avatar">${avatarImg}</div>`;

  const nameHtml = isOwnProfile
    ? `<h2 class="editable-name" title="Click to edit name" onclick="editDisplayName(this)">${escHtml(displayName)}</h2>`
    : `<h2>${escHtml(displayName)}</h2>`;

  let html = `
    <div class="profile-header">
      ${avatarHtml}
      <div class="profile-info">
        ${nameHtml}
        ${profile.username ? `<div class="username">@${escHtml(profile.username)}</div>` : ''}
        ${profile.bio ? `<div style="font-size:0.78rem;color:var(--white-dim);margin-top:6px">${escHtml(profile.bio)}</div>` : ''}
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="num">${stats.visited}</div>
        <div class="label">Visited</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.wantToGo}</div>
        <div class="label">Want to Go</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.locationCount}</div>
        <div class="label">States / Countries</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.michelinVisited}</div>
        <div class="label">Michelin Visited</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.jbfWinnersVisited}</div>
        <div class="label">JBF Winners</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        Visited
        <span class="section-count">${stats.visited}</span>
      </div>
      ${renderList(visits, 'visited')}
    </div>

    <div class="section">
      <div class="section-title">
        Want to Go
        <span class="section-count" id="section-wtg-count">${stats.wantToGo}</span>
      </div>
      ${renderList(wtgItems, 'wantToGo')}
    </div>

    ${renderListsSection(customLists)}
  `;

  document.getElementById('profile-content').innerHTML = html;
  document.getElementById('profile-content').style.display = '';
  document.getElementById('loading').style.display = 'none';

  document.title = `${displayName} — Delectable`;

  bindShowMore('visited');
  bindShowMore('wantToGo');
}

// ── Profile editing ──────────────────────────────────────────────────────────
function editDisplayName(el) {
  const current = el.textContent.trim();
  const input = document.createElement('input');
  input.type      = 'text';
  input.className = 'name-edit-input';
  input.value     = current;
  input.maxLength = 50;
  el.replaceWith(input);
  input.focus();
  input.select();

  async function commit() {
    const name = input.value.trim() || current;
    if (name !== current) {
      await sb.from('profiles').update({ display_name: name }).eq('id', currentUser.id);
      if (profileUser) profileUser.display_name = name;
    }
    const h2 = document.createElement('h2');
    h2.className = 'editable-name';
    h2.title     = 'Click to edit name';
    h2.textContent = name;
    h2.onclick = () => editDisplayName(h2);
    input.replaceWith(h2);
  }
  function cancel() {
    const h2 = document.createElement('h2');
    h2.className = 'editable-name';
    h2.title     = 'Click to edit name';
    h2.textContent = current;
    h2.onclick = () => editDisplayName(h2);
    input.replaceWith(h2);
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { input.removeEventListener('blur', commit); commit(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', commit); cancel(); }
  });
}

async function uploadAvatar(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  if (file.size > 3 * 1024 * 1024) { alert('Image must be under 3 MB'); return; }
  const ext  = file.name.split('.').pop().toLowerCase() || 'jpg';
  const path = `${currentUser.id}/avatar.${ext}`;
  const { error: upErr } = await sb.storage.from('avatars').upload(path, file, { upsert: true });
  if (upErr) { alert('Upload failed: ' + upErr.message); return; }
  const { data: { publicUrl } } = sb.storage.from('avatars').getPublicUrl(path);
  // Bust cache
  const url = publicUrl + '?t=' + Date.now();
  await sb.from('profiles').update({ avatar_url: url }).eq('id', currentUser.id);
  if (profileUser) profileUser.avatar_url = url;
  // Update avatar in DOM without full re-render
  const avatarEl = document.querySelector('.avatar-editable');
  if (avatarEl) {
    let img = avatarEl.querySelector('img');
    if (img) { img.src = url; }
    else {
      const span = avatarEl.querySelector('span');
      if (span) { img = document.createElement('img'); img.alt = 'avatar'; img.src = url; span.replaceWith(img); }
    }
  }
}

// ── My Lists section ─────────────────────────────────────────────────────────
let profileLists = []; // live array updated by mutations

function renderListsSection(lists) {
  profileLists = lists || [];
  if (!isOwnProfile && !profileLists.length) return '';

  const rows = profileLists.map(l => renderListRow(l)).join('');

  const newListForm = isOwnProfile ? `
    <form class="new-list-form" id="new-list-form" onsubmit="createProfileList(event)">
      <input class="new-list-input" id="new-list-name" type="text" placeholder="New list name…" maxlength="60">
      <button type="submit" class="btn-orange" style="font-size:0.75rem;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-weight:700;">Create</button>
    </form>
  ` : '';

  return `
    <div class="section lists-section" id="lists-section">
      <div class="section-title">
        My Lists
        <span class="section-count" id="section-lists-count">${profileLists.length}</span>
      </div>
      <div id="lists-rows">
        ${rows || `<div class="empty-state">No lists yet.</div>`}
      </div>
      ${newListForm}
    </div>
  `;
}

function renderListRow(list) {
  const visibilityBtn = isOwnProfile ? `
    <button class="visibility-pill ${list.is_public ? 'public' : ''}"
      onclick="event.stopPropagation(); toggleListPublic('${escHtml(list.id)}')"
    >${list.is_public ? 'Public' : 'Private'}</button>
  ` : '';

  const openBtn = list.slug ? `
    <a class="list-action-btn" href="/list.html?slug=${escHtml(list.slug)}"
      onclick="event.stopPropagation()" target="_blank" title="Open list page"
      style="text-decoration:none;">Open →</a>
  ` : '';

  const shareBtn = list.slug ? `
    <button class="list-action-btn" id="share-list-${escHtml(list.id)}"
      onclick="event.stopPropagation(); shareList('${escHtml(list.id)}', '${escHtml(list.slug)}')"
      title="Copy link">Copy link</button>
  ` : '';

  const deleteBtn = isOwnProfile ? `
    <button class="list-action-btn delete"
      onclick="event.stopPropagation(); deleteProfileList('${escHtml(list.id)}')"
      title="Delete">✕</button>
  ` : '';

  return `
    <div class="list-row" id="list-row-${escHtml(list.id)}">
      <div class="list-row-header" onclick="toggleListExpand('${escHtml(list.id)}')">
        <span class="list-chevron">▶</span>
        <span class="list-row-name">${escHtml(list.name)}</span>
        <span class="list-row-count">${list.count} place${list.count !== 1 ? 's' : ''}</span>
        <div class="list-row-actions">
          ${visibilityBtn}
          ${openBtn}
          ${shareBtn}
          ${deleteBtn}
        </div>
      </div>
      <div class="list-row-body" id="list-body-${escHtml(list.id)}"></div>
    </div>
  `;
}

function reRenderListsRows() {
  const container = document.getElementById('lists-rows');
  if (!container) return;
  container.innerHTML = profileLists.length
    ? profileLists.map(l => renderListRow(l)).join('')
    : `<div class="empty-state">No lists yet.</div>`;
  const countEl = document.getElementById('section-lists-count');
  if (countEl) countEl.textContent = profileLists.length;
}

async function toggleListExpand(listId) {
  const row  = document.getElementById(`list-row-${listId}`);
  const body = document.getElementById(`list-body-${listId}`);
  if (!row || !body) return;

  const isExpanded = row.classList.contains('expanded');
  if (isExpanded) {
    row.classList.remove('expanded');
    return;
  }

  row.classList.add('expanded');

  // Lazy-load items if not already loaded
  if (body.dataset.loaded) return;
  body.innerHTML = `<div class="list-body-loading">Loading…</div>`;

  const { data: items } = await sb
    .from('list_items')
    .select('restaurant_key, note, added_at')
    .eq('list_id', listId)
    .order('added_at', { ascending: false });

  if (!items || !items.length) {
    body.innerHTML = `<div class="list-body-loading">Nothing in this list yet.</div>`;
    body.dataset.loaded = '1';
    return;
  }

  const keys = items.map(i => i.restaurant_key);
  const { data: rests } = await sb
    .from('restaurants_with_summary')
    .select('key, name, city, state, country, photo_url, award_summary')
    .in('key', keys);

  const restMap = {};
  (rests || []).forEach(r => { restMap[r.key] = r; });

  body.innerHTML = items.map(item => {
    const r = restMap[item.restaurant_key] || {};
    const name     = r.name || item.restaurant_key.split('|')[0];
    const location = [r.city, r.state || r.country].filter(Boolean).join(', ');
    const badge    = listBadgeText(r.award_summary);
    const sub      = [badge, location].filter(Boolean).join(' · ');
    const photo    = r.photo_url
      ? `<img class="list-compact-photo" src="${escHtml(r.photo_url)}" alt="" loading="lazy">`
      : `<div class="list-compact-placeholder">🍽</div>`;
    const ek = encodeURIComponent(item.restaurant_key);
    let mapHref = `/?popup=${ek}`;
    if (r.lat && r.lng) mapHref += `&lat=${r.lat}&lng=${r.lng}`;

    return `
      <a class="list-compact-item" href="${mapHref}" style="text-decoration:none;color:inherit;">
        ${photo}
        <div class="list-compact-info">
          <div class="list-compact-name">${escHtml(name)}</div>
          ${sub ? `<div class="list-compact-sub">${escHtml(sub)}</div>` : ''}
          ${item.note ? `<div class="list-compact-note">${escHtml(item.note)}</div>` : ''}
        </div>
      </a>
    `;
  }).join('');

  body.dataset.loaded = '1';
}

function listBadgeText(summary) {
  if (!summary) return '';
  if (summary.includes('Winner')) return '🥇 Winner';
  if (summary.startsWith('Michelin')) return summary;
  return '';
}

async function toggleListPublic(listId) {
  const list = profileLists.find(l => l.id === listId);
  if (!list) return;
  const newVal = !list.is_public;
  list.is_public = newVal;

  await sb.from('lists').update({ is_public: newVal }).eq('id', listId);

  const pill = document.querySelector(`#list-row-${listId} .visibility-pill`);
  if (pill) {
    pill.textContent = newVal ? 'Public' : 'Private';
    pill.classList.toggle('public', newVal);
  }
}

async function shareList(listId, slug) {
  const origin = window.location.hostname === 'localhost' ? 'https://www.delectable.guide' : window.location.origin;
  const url = `${origin}/list.html?slug=${encodeURIComponent(slug)}`;
  const btn = document.getElementById(`share-list-${listId}`);

  if (navigator.share) {
    try { await navigator.share({ url }); return; } catch (_) {}
  }
  await navigator.clipboard.writeText(url);
  if (btn) {
    btn.textContent = '✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⤴'; btn.classList.remove('copied'); }, 2000);
  }
}

async function deleteProfileList(listId) {
  if (!confirm('Delete this list? This cannot be undone.')) return;

  await sb.from('list_items').delete().eq('list_id', listId);
  await sb.from('lists').delete().eq('id', listId);

  profileLists = profileLists.filter(l => l.id !== listId);
  reRenderListsRows();
}

async function createProfileList(e) {
  e.preventDefault();
  const input = document.getElementById('new-list-name');
  const name  = input.value.trim();
  if (!name || !currentUser) return;

  const slug = slugifyProfile(name);
  const { data: newList } = await sb.from('lists').insert({
    user_id: currentUser.id, name, slug, is_public: true,
  }).select('id, name, slug, is_public').single();

  if (!newList) return;
  input.value = '';
  profileLists.push({ ...newList, count: 0 });
  reRenderListsRows();
}

function slugifyProfile(name) {
  const base = name.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '').trim()
    .replace(/\s+/g, '-').slice(0, 40);
  const suffix = Math.random().toString(36).slice(2, 6);
  return `${base}-${suffix}`;
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadProfile(userId) {
  // Fetch profile
  const { data: profile, error: profileErr } = await sb
    .from('profiles')
    .select('id, display_name, username, avatar_url, bio')
    .eq('id', userId)
    .single();

  if (profileErr || !profile) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = '';
    return;
  }

  profileUser = profile;

  // Fetch visits and all lists in parallel
  const [visitsRes, allListsRes] = await Promise.all([
    sb.from('visits')
      .select('restaurant_key, visited_on, created_at')
      .eq('user_id', userId)
      .order('visited_on', { ascending: false, nullsFirst: false })
      .order('created_at', { ascending: false }),
    sb.from('lists')
      .select('id, name, slug, is_public')
      .eq('user_id', userId),
  ]);

  const visits   = visitsRes.data || [];
  const allLists = allListsRes.data || [];

  const wtgList     = allLists.find(l => l.name === 'Want to Go');
  const customLists = allLists.filter(l => l.name !== 'Want to Go');

  // Only show public lists on other people's profiles
  const viewingOwn = currentUser?.id === userId;
  const visibleCustomLists = viewingOwn
    ? customLists
    : customLists.filter(l => l.is_public);

  let wtgItems = [];
  if (wtgList) {
    const { data: items } = await sb
      .from('list_items')
      .select('restaurant_key, added_at')
      .eq('list_id', wtgList.id)
      .order('added_at', { ascending: false });
    wtgItems = items || [];
  }

  // Fetch item counts for custom lists
  const listCounts = {};
  if (visibleCustomLists.length) {
    const ids = visibleCustomLists.map(l => l.id);
    const { data: countRows } = await sb
      .from('list_items')
      .select('list_id')
      .in('list_id', ids);
    (countRows || []).forEach(r => {
      listCounts[r.list_id] = (listCounts[r.list_id] || 0) + 1;
    });
  }

  // Batch-fetch restaurant display data for visits + WTG
  const allKeys = [...new Set([
    ...visits.map(v => v.restaurant_key),
    ...wtgItems.map(i => i.restaurant_key),
  ])];

  const restaurantMap = {};
  if (allKeys.length) {
    const { data: rests } = await sb
      .from('restaurants_with_summary')
      .select('key, name, city, state, country, photo_url, award_summary, lat, lng')
      .in('key', allKeys);
    if (rests) rests.forEach(r => { restaurantMap[r.key] = r; });
  }

  // Merge restaurant data into visit/list rows
  const enrichedVisits   = visits.map(v  => ({ ...v,  ...restaurantMap[v.restaurant_key]  }));
  const enrichedWtgItems = wtgItems.map(i => ({ ...i, ...restaurantMap[i.restaurant_key] }));

  const listsWithCounts = visibleCustomLists.map(l => ({ ...l, count: listCounts[l.id] || 0 }));

  isOwnProfile = viewingOwn;
  if (wtgList) wtgListId = wtgList.id;
  renderProfile(profile, enrichedVisits, enrichedWtgItems, listsWithCounts);
}

    `;
    document.getElementById('error-msg').style.display = '';
    return;
  }

  await loadProfile(userId);
})();
