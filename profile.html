<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Delectable</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FEA219;
      --orange-dim: rgba(254,162,25,0.15);
      --black: #0d0d0d;
      --black-mid: #141414;
      --black-light: #1c1c1c;
      --border: #2a2a2a;
      --border-light: #333;
      --white: #ffffff;
      --white-dim: rgba(255,255,255,0.6);
      --white-faint: rgba(255,255,255,0.25);
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-wordmark a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .header-wordmark .brand {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white-dim);
    }

    .header-wordmark h1 {
      font-family: sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--white);
    }

    .header-divider {
      width: 1px;
      height: 28px;
      background: var(--border-light);
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--white-dim);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--white-dim); color: var(--white); }

    .btn-orange {
      background: var(--orange);
      border: 1px solid var(--orange);
      color: var(--black);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ── Layout ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Profile header ── */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--black-light);
      border: 2px solid var(--border);
      object-fit: cover;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--white-dim);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .profile-info h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .profile-info .username {
      font-size: 0.78rem;
      color: var(--white-dim);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--black-light);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--orange);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card .label {
      font-size: 0.68rem;
      color: var(--white-dim);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Section ── */
    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--white-dim);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-count {
      font-size: 0.65rem;
      color: var(--white-faint);
      font-weight: 400;
    }

    /* ── Restaurant list ── */
    .rest-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .rest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--black-mid);
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
    }

    .rest-item:hover { background: var(--black-light); }

    .rest-thumb {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
    }

    .rest-thumb-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .rest-info {
      flex: 1;
      min-width: 0;
    }

    .rest-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rest-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
      flex-wrap: wrap;
    }

    .rest-location {
      font-size: 0.72rem;
      color: var(--white-dim);
    }

    .rest-badge {
      font-size: 0.62rem;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .badge-winner   { background: rgba(254,162,25,0.18); color: var(--orange); }
    .badge-michelin { background: rgba(220,50,50,0.15); color: #e86; }
    .badge-nominee  { background: rgba(255,255,255,0.07); color: var(--white-dim); }

    .rest-date {
      font-size: 0.68rem;
      color: var(--white-faint);
    }

    .map-link {
      font-size: 0.72rem;
      color: var(--orange);
      text-decoration: none;
      flex-shrink: 0;
      opacity: 0.7;
      padding: 4px 10px;
      border: 1px solid rgba(254,162,25,0.3);
      border-radius: 6px;
      transition: opacity 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .map-link:hover { opacity: 1; border-color: var(--orange); }

    .remove-btn {
      background: transparent;
      border: none;
      color: var(--white-faint);
      font-size: 0.75rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
      line-height: 1;
    }
    .remove-btn:hover { color: #e55; background: rgba(220,50,50,0.12); }
    .remove-btn:disabled { opacity: 0.4; cursor: default; }

    @media (max-width: 600px) {
      .rest-thumb, .rest-thumb-placeholder { width: 40px; height: 40px; }
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--white-faint);
      font-size: 0.82rem;
    }

    /* ── Error / loading ── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--white-dim);
      font-size: 0.85rem;
    }

    #error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--white-dim);
    }

    #error-msg h2 { margin-bottom: 12px; font-size: 1.2rem; }
    #error-msg p  { font-size: 0.82rem; color: var(--white-faint); }

    /* ── Own-profile edit ── */
    .edit-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .edit-input {
      background: var(--black-light);
      border: 1px solid var(--border-light);
      color: var(--white);
      font-family: inherit;
      font-size: 0.82rem;
      padding: 5px 10px;
      border-radius: 6px;
      outline: none;
      min-width: 0;
      flex: 1;
    }
    .edit-input:focus { border-color: var(--orange); }

    /* ── Show more ── */
    .show-more-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: border-color 0.15s, color 0.15s;
    }
    .show-more-btn:hover { border-color: var(--white-dim); color: var(--white); }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .page  { padding: 24px 16px 60px; }
      .rest-location { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-wordmark">
    <a href="/">
      <span class="brand">The</span>
      <h1>Delectable</h1>
    </a>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub">Profile</span>
  <div class="header-actions" id="header-actions">
    <!-- filled by JS -->
  </div>
</header>

<div class="page" id="page">
  <div class="loading" id="loading">Loading profile…</div>
  <div id="error-msg" style="display:none">
    <h2>Profile not found</h2>
    <p>This user doesn't exist or their profile is private.</p>
  </div>
  <div id="profile-content" style="display:none">
    <!-- filled by JS -->
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bnlnlfnrkwizviiabhex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubG5sZm5ya3dpenZpaWFiaGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTgxODgsImV4cCI6MjA5MTMzNDE4OH0.GW0-kcOrcQ8YXyqvI6LbDnLM1IIQTkL1FFajJUrkfHk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let profileUser = null;
let isOwnProfile = false;
let wtgListId = null;

// ── Helpers ────────────────────────────────────────────────────────────────
function badgeHtml(summary) {
  if (!summary) return '';
  if (summary.startsWith('Michelin')) {
    return `<span class="rest-badge badge-michelin">${summary}</span>`;
  }
  if (summary.includes('Winner')) {
    return `<span class="rest-badge badge-winner">JBF Winner</span>`;
  }
  return `<span class="rest-badge badge-nominee">JBF</span>`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function mapUrl(restaurantKey) {
  const [name, city, stateOrCountry] = restaurantKey.split('|');
  const q = encodeURIComponent([name, city, stateOrCountry].filter(Boolean).join(' '));
  return `/?search=${q}`;
}

// ── Auth header ─────────────────────────────────────────────────────────────
function renderAuthHeader(user) {
  const el = document.getElementById('header-actions');
  if (user) {
    el.innerHTML = `
      <span style="font-size:0.72rem;color:var(--white-dim)">${user.email}</span>
      <a href="/profile.html?user=${user.id}" style="font-size:0.72rem;color:var(--orange);text-decoration:none;">My Profile</a>
      <button class="btn-ghost" onclick="signOut()">Sign out</button>
    `;
  } else {
    el.innerHTML = `<button class="btn-orange" onclick="signIn()">Sign in</button>`;
  }
}

async function signIn() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  renderAuthHeader(null);
}

// ── Stats computation ────────────────────────────────────────────────────────
function computeStats(visits, wtgItems) {
  const stats = {
    visited: visits.length,
    wantToGo: wtgItems.length,
    locations: new Set(),
    michelinVisited: 0,
    jbfWinnersVisited: 0,
  };

  for (const v of visits) {
    const place = v.state || v.country;
    if (place) stats.locations.add(place);
    if (v.award_summary?.startsWith('Michelin')) stats.michelinVisited++;
    if (v.award_summary?.includes('Winner')) stats.jbfWinnersVisited++;
  }

  return {
    ...stats,
    locationCount: stats.locations.size,
  };
}

// ── Render ───────────────────────────────────────────────────────────────────
const PAGE_SIZE = 20;
// Store full item arrays keyed by list type for "show more"
const listData = {};

function renderList(items, type) {
  listData[type] = items;

  if (!items.length) {
    return `<div class="empty-state">Nothing here yet.</div>`;
  }

  const visible = items.slice(0, PAGE_SIZE);
  const hidden  = items.length - visible.length;

  let html = '<div class="rest-list" id="list-' + type + '">';
  for (const item of visible) {
    html += renderItem(item, type);
  }
  html += '</div>';

  if (hidden > 0) {
    html += `<button class="show-more-btn" id="show-more-${type}">Show ${hidden} more</button>`;
  }

  return html;
}

function renderItem(item, type) {
  const name     = item.name || item.restaurant_key.split('|')[0];
  const location = [item.city, item.state || item.country].filter(Boolean).join(', ');
  const summary  = item.award_summary || '';
  const date     = type === 'visited' ? item.visited_on : null;

  const key = encodeURIComponent(item.restaurant_key);
  let mapHref = `/?popup=${key}`;
  if (item.lat && item.lng) mapHref += `&lat=${item.lat}&lng=${item.lng}`;

  const thumbHtml = item.photo_url
    ? `<img class="rest-thumb" src="${escHtml(item.photo_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="rest-thumb-placeholder" style="display:none">🍽</div>`
    : `<div class="rest-thumb-placeholder">🍽</div>`;

  const removeBtn = (isOwnProfile && type === 'wantToGo')
    ? `<button class="remove-btn" onclick="removeWantToGo(this, '${key}')" title="Remove">✕</button>`
    : '';

  return `
    <div class="rest-item" data-key="${key}">
      ${thumbHtml}
      <div class="rest-info">
        <div class="rest-name">${escHtml(name)}</div>
        <div class="rest-meta">
          ${location ? `<span class="rest-location">${escHtml(location)}</span>` : ''}
          ${badgeHtml(summary)}
          ${date ? `<span class="rest-date">${formatDate(date)}</span>` : ''}
        </div>
      </div>
      <a class="map-link" href="${mapHref}">View on map</a>
      ${removeBtn}
    </div>`;
}

async function removeWantToGo(btn, encodedKey) {
  const restaurantKey = decodeURIComponent(encodedKey);
  btn.disabled = true;
  btn.textContent = '…';

  const { error } = await sb.from('list_items').delete()
    .eq('list_id', wtgListId).eq('restaurant_key', restaurantKey);

  if (error) { btn.disabled = false; btn.textContent = '✕'; return; }

  // Remove from DOM and local data
  const el = btn.closest('.rest-item');
  el.remove();
  listData['wantToGo'] = listData['wantToGo'].filter(i => i.restaurant_key !== restaurantKey);

  // Update stats count
  const countEl = document.querySelector('#section-wtg-count');
  if (countEl) countEl.textContent = listData['wantToGo'].length;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function bindShowMore(type) {
  const btn = document.getElementById('show-more-' + type);
  if (!btn) return;
  btn.addEventListener('click', () => {
    const container = document.getElementById('list-' + type);
    const currentCount = container.querySelectorAll('.rest-item').length;
    const items = listData[type];
    const next  = items.slice(currentCount, currentCount + PAGE_SIZE);
    const frag  = document.createElement('div');
    frag.innerHTML = next.map(i => renderItem(i, type)).join('');
    while (frag.firstChild) container.appendChild(frag.firstChild);
    const remaining = items.length - container.querySelectorAll('.rest-item').length;
    if (remaining <= 0) btn.remove();
    else btn.textContent = `Show ${remaining} more`;
  });
}

function renderProfile(profile, visits, wtgItems) {
  const stats = computeStats(visits, wtgItems);

  const avatarHtml = profile.avatar_url
    ? `<div class="avatar"><img src="${escHtml(profile.avatar_url)}" alt="avatar"></div>`
    : `<div class="avatar">👤</div>`;

  const displayName = profile.display_name || profile.username || 'Anonymous';

  let html = `
    <div class="profile-header">
      ${avatarHtml}
      <div class="profile-info">
        <h2>${escHtml(displayName)}</h2>
        ${profile.username ? `<div class="username">@${escHtml(profile.username)}</div>` : ''}
        ${profile.bio ? `<div style="font-size:0.78rem;color:var(--white-dim);margin-top:6px">${escHtml(profile.bio)}</div>` : ''}
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="num">${stats.visited}</div>
        <div class="label">Visited</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.wantToGo}</div>
        <div class="label">Want to Go</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.locationCount}</div>
        <div class="label">States / Countries</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.michelinVisited}</div>
        <div class="label">Michelin Visited</div>
      </div>
      <div class="stat-card">
        <div class="num">${stats.jbfWinnersVisited}</div>
        <div class="label">JBF Winners</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">
        Visited
        <span class="section-count">${stats.visited}</span>
      </div>
      ${renderList(visits, 'visited')}
    </div>

    <div class="section">
      <div class="section-title">
        Want to Go
        <span class="section-count" id="section-wtg-count">${stats.wantToGo}</span>
      </div>
      ${renderList(wtgItems, 'wantToGo')}
    </div>
  `;

  document.getElementById('profile-content').innerHTML = html;
  document.getElementById('profile-content').style.display = '';
  document.getElementById('loading').style.display = 'none';

  document.title = `${displayName} — Delectable`;

  bindShowMore('visited');
  bindShowMore('wantToGo');
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadProfile(userId) {
  // Fetch profile
  const { data: profile, error: profileErr } = await sb
    .from('profiles')
    .select('id, display_name, username, avatar_url, bio')
    .eq('id', userId)
    .single();

  if (profileErr || !profile) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').style.display = '';
    return;
  }

  profileUser = profile;

  // Fetch visits and want-to-go list in parallel
  const [visitsRes, listsRes] = await Promise.all([
    sb.from('visits')
      .select('restaurant_key, visited_on, created_at')
      .eq('user_id', userId)
      .order('visited_on', { ascending: false, nullsFirst: false })
      .order('created_at', { ascending: false }),
    sb.from('lists')
      .select('id')
      .eq('user_id', userId)
      .eq('name', 'Want to Go')
      .limit(1),
  ]);

  const visits = visitsRes.data || [];
  const lists  = listsRes.data || [];

  let wtgItems = [];
  if (lists.length) {
    const { data: items } = await sb
      .from('list_items')
      .select('restaurant_key, added_at')
      .eq('list_id', lists[0].id)
      .order('added_at', { ascending: false });
    wtgItems = items || [];
  }

  // Batch-fetch restaurant display data for all unique keys
  const allKeys = [...new Set([
    ...visits.map(v => v.restaurant_key),
    ...wtgItems.map(i => i.restaurant_key),
  ])];

  const restaurantMap = {};
  if (allKeys.length) {
    const { data: rests } = await sb
      .from('restaurants_with_summary')
      .select('key, name, city, state, country, photo_url, award_summary, lat, lng')
      .in('key', allKeys);
    if (rests) rests.forEach(r => { restaurantMap[r.key] = r; });
  }

  // Merge restaurant data into visit/list rows
  const enrichedVisits   = visits.map(v  => ({ ...v,  ...restaurantMap[v.restaurant_key]  }));
  const enrichedWtgItems = wtgItems.map(i => ({ ...i, ...restaurantMap[i.restaurant_key] }));

  isOwnProfile = currentUser?.id === userId;
  if (lists.length) wtgListId = lists[0].id;
  renderProfile(profile, enrichedVisits, enrichedWtgItems);
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  // Get auth state
  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  renderAuthHeader(currentUser);

  // Parse ?user= param
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('user') || (currentUser ? currentUser.id : null);

  if (!userId) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').innerHTML = `
      <h2>No profile selected</h2>
      <p>Sign in to view your profile, or share a profile URL.</p>
      <button class="btn-orange" onclick="signIn()" style="margin-top:20px">Sign in with Google</button>
    `;
    document.getElementById('error-msg').style.display = '';
    return;
  }

  await loadProfile(userId);
})();
</script>
</body>
</html>
