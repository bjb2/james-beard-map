<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List — Delectable</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FEA219;
      --orange-dim: rgba(254,162,25,0.15);
      --black: #0d0d0d;
      --black-mid: #141414;
      --black-light: #1c1c1c;
      --border: #2a2a2a;
      --border-light: #333;
      --white: #ffffff;
      --white-dim: rgba(255,255,255,0.6);
      --white-faint: rgba(255,255,255,0.25);
    }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-logo { height: 36px; width: 36px; object-fit: contain; flex-shrink: 0; }

    .header-wordmark a {
      text-decoration: none;
      color: inherit;
    }
    .header-wordmark h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .header-divider { width: 1px; height: 28px; background: var(--border-light); }
    .header-sub { font-size: 0.72rem; color: var(--white-dim); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* ── View toggle ── */
    .view-toggle {
      display: flex;
      background: var(--black-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .view-toggle-btn {
      background: transparent;
      border: none;
      color: var(--white-dim);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .view-toggle-btn.active {
      background: var(--border-light);
      color: var(--white);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-size: 0.72rem;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-ghost:hover { border-color: var(--white-dim); color: var(--white); }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--white-dim);
      font-size: 0.72rem;
      padding: 5px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .share-btn:hover { border-color: var(--white-dim); color: var(--white); }
    .share-btn.copied { border-color: var(--orange); color: var(--orange); }

    /* ── List meta bar ── */
    .list-meta-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 0;
    }

    .list-title {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .list-meta {
      font-size: 0.78rem;
      color: var(--white-dim);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .list-meta a { color: var(--orange); text-decoration: none; }
    .list-meta a:hover { text-decoration: underline; }
    .list-meta-dot { color: var(--border-light); }

    .list-description {
      margin-top: 10px;
      font-size: 0.85rem;
      color: var(--white-dim);
      line-height: 1.5;
      max-width: 600px;
    }

    .sign-in-nudge {
      margin-top: 8px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.3);
    }
    .sign-in-nudge a { color: rgba(255,255,255,0.4); text-decoration: underline; cursor: pointer; }

    /* ── Views ── */
    #view-list { display: block; }
    #view-map  { display: none; }

    /* ── List view ── */
    .list-view-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    .rich-cards { display: flex; flex-direction: column; }

    .rich-card {
      display: flex;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
    }

    .rc-photo {
      width: 90px;
      height: 90px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--black-light);
    }
    .rc-photo-placeholder {
      width: 90px;
      height: 90px;
      border-radius: 10px;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .rc-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

    .rc-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .rc-sub {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--white-dim);
    }

    .rc-badge {
      font-size: 0.7rem;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-winner   { background: var(--orange-dim); color: var(--orange); }
    .badge-michelin { background: rgba(220,50,50,0.15); color: #e87; }
    .badge-tm       { background: rgba(26,111,168,0.2); color: #6bb8f0; }
    .badge-other    { background: rgba(255,255,255,0.07); color: var(--white-dim); }

    .rc-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .rc-link {
      font-size: 0.72rem;
      color: var(--orange);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      opacity: 0.8;
      transition: opacity 0.12s;
    }
    .rc-link:hover { opacity: 1; }

    .rc-note {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      font-style: italic;
      line-height: 1.4;
      cursor: pointer;
      margin-top: 2px;
    }
    .rc-note:hover { color: rgba(255,255,255,0.65); }

    .add-note-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.22);
      font-size: 0.7rem;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 0;
      margin-top: 2px;
    }
    .add-note-btn:hover { color: rgba(255,255,255,0.5); }

    .note-input {
      width: 100%;
      background: var(--black-light);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--white);
      font-family: inherit;
      font-size: 0.75rem;
      font-style: italic;
      padding: 5px 8px;
      margin-top: 4px;
      resize: none;
      outline: none;
      line-height: 1.4;
    }
    .note-input:focus { border-color: var(--orange); }

    /* ── Map view ── */
    .map-view-inner {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 60px);
    }

    #list-map {
      flex: 1;
      min-height: 0;
      background: var(--black-light);
    }

    .map-list-drawer {
      height: 260px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      background: var(--black-mid);
    }

    /* ── Leaflet dark theme ── */
    .leaflet-popup-content-wrapper {
      background: #141414 !important;
      border: 1px solid #333 !important;
      border-radius: 6px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
      color: #fff !important;
    }
    .leaflet-popup-tip { background: #141414 !important; }
    .leaflet-popup-close-button { color: rgba(255,255,255,0.5) !important; top: 4px !important; right: 6px !important; }
    .leaflet-popup-close-button:hover { color: #fff !important; background: transparent !important; }
    .leaflet-popup-content { margin: 0 !important; overflow: hidden; border-radius: 6px; }

    /* ── List popup ── */
    .list-popup { min-width: 220px; max-width: 260px; font-family: sans-serif; }
    .lp-photo-wrap { position: relative; overflow: hidden; height: 100px; }
    .lp-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lp-photo-gradient {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(13,13,13,0.92));
      padding: 18px 12px 8px;
    }
    .lp-header { padding: 12px 12px 0; }
    .lp-name { font-size: 0.92rem; font-weight: 700; color: #fff; line-height: 1.2; }
    .lp-loc  { font-size: 0.72rem; color: rgba(255,255,255,0.55); margin-top: 2px; }
    .lp-body { padding: 8px 12px 10px; }
    .lp-badge-row { margin-bottom: 6px; }
    .lp-links {
      display: flex; flex-wrap: wrap; gap: 6px 12px; margin-bottom: 6px;
    }
    .lp-links a {
      font-size: 0.7rem; color: #FEA219; text-decoration: none; opacity: 0.85;
      transition: opacity 0.12s;
    }
    .lp-links a:hover { opacity: 1; }
    .lp-note {
      font-size: 0.72rem; font-style: italic; color: rgba(255,255,255,0.5);
      border-top: 1px solid #2a2a2a; padding-top: 6px; margin-top: 4px;
      line-height: 1.4;
    }

    /* ── Description editing ── */
    .add-desc-btn {
      background: none; border: none; color: rgba(255,255,255,0.22);
      font-size: 0.82rem; font-family: inherit; cursor: pointer;
      padding: 0; margin-top: 8px; display: block;
    }
    .add-desc-btn:hover { color: rgba(255,255,255,0.5); }
    .list-description.owner-editable { cursor: pointer; }
    .list-description.owner-editable:hover { color: var(--white-dim); }
    .desc-input {
      width: 100%; background: var(--black-light); border: 1px solid var(--border-light);
      border-radius: 6px; color: var(--white); font-family: inherit;
      font-size: 0.85rem; padding: 6px 10px; margin-top: 10px;
      resize: none; outline: none; line-height: 1.5;
    }
    .desc-input:focus { border-color: var(--orange); }

    /* ── Drawer rich cards ── */
    .drawer-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .drawer-item:hover { background: var(--black-light); }
    .drawer-item.active { background: var(--orange-dim); }

    .drawer-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--black-light);
    }
    .drawer-thumb-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--black-light);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .drawer-body { flex: 1; min-width: 0; }
    .drawer-name {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .drawer-sub {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .drawer-loc {
      font-size: 0.7rem;
      color: var(--white-faint);
    }
    .drawer-badge {
      font-size: 0.62rem;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
    }

    /* ── Save to list buttons ── */
    .save-to-list-btn {
      background: none; border: 1px solid var(--border-light);
      color: rgba(255,255,255,0.35); font-size: 0.68rem; font-family: inherit;
      padding: 3px 8px; border-radius: 6px; cursor: pointer; margin-top: 4px;
      transition: color 0.12s, border-color 0.12s;
    }
    .save-to-list-btn:hover { color: var(--orange); border-color: var(--orange); }

    .drawer-save-btn {
      flex-shrink: 0; background: none; border: 1px solid var(--border-light);
      color: rgba(255,255,255,0.4); font-size: 0.85rem; line-height: 1;
      width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.12s, border-color 0.12s;
    }
    .drawer-save-btn:hover { color: var(--orange); border-color: var(--orange); }

    .lp-save-btn {
      width: 100%; background: none; border: 1px solid var(--border-light);
      color: rgba(255,255,255,0.45); font-size: 0.72rem; font-family: inherit;
      padding: 5px 0; border-radius: 6px; cursor: pointer; margin-top: 6px;
      transition: color 0.12s, border-color 0.12s;
    }
    .lp-save-btn:hover { color: var(--orange); border-color: var(--orange); }

    /* ── Owner card actions ── */
    .rc-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .rc-action-btn {
      font-size: 0.7rem;
      font-family: inherit;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--white-faint);
      cursor: pointer;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
      line-height: 1;
    }
    .rc-action-btn:hover { color: var(--white-dim); border-color: var(--white-dim); }
    .rc-action-btn.visited-active { color: #2ecc71; border-color: #2ecc71; background: rgba(46,204,113,0.1); }
    .rc-action-btn.remove:hover   { color: #e55;    border-color: #e55;    background: rgba(220,50,50,0.1); }
    .rc-visit-date { font-size: 0.68rem; color: rgba(255,255,255,0.3); }
    .rc-date-row {
      display: flex; gap: 6px; align-items: center;
      margin-top: 6px; flex-wrap: wrap;
    }
    .rc-date-input {
      flex: 1; min-width: 120px;
      background: var(--black-light); border: 1px solid var(--border-light);
      color: var(--white); font-family: inherit; font-size: 0.72rem;
      padding: 4px 8px; border-radius: 6px; outline: none; cursor: pointer;
    }
    .rc-date-save {
      font-family: inherit; font-size: 0.7rem; padding: 4px 10px;
      border-radius: 6px; border: 1px solid var(--orange);
      color: var(--orange); background: transparent; cursor: pointer;
    }
    .rc-date-skip {
      font-family: inherit; font-size: 0.7rem; padding: 4px 8px;
      border-radius: 6px; border: 1px solid var(--border-light);
      color: var(--white-faint); background: transparent; cursor: pointer;
    }

    /* ── States ── */
    .state-loading, .state-error, .state-empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--white-dim);
    }
    .state-loading .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-error h2, .state-empty h2 {
      font-size: 1.1rem; font-weight: 600; color: var(--white); margin-bottom: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 0 14px; gap: 10px; }
      .header-sub { display: none; }
      .list-meta-bar { padding: 18px 16px 0; }
      .list-title { font-size: 1.3rem; }
      .list-view-inner { padding: 16px 16px 60px; }
      .rc-photo, .rc-photo-placeholder { width: 72px; height: 72px; }
      .map-list-drawer { height: 220px; }
    }
  </style>
</head>
<body>

<header>
  <img src="/logo.png" class="header-logo" alt="">
  <div class="header-wordmark">
    <a href="/"><h1>Delectable</h1></a>
  </div>
  <div class="header-divider"></div>
  <span class="header-sub" id="header-sub">Curated List</span>
  <div class="header-actions">
    <div class="view-toggle" id="view-toggle" style="display:none;">
      <button class="view-toggle-btn active" onclick="setView('list')">☰ List</button>
      <button class="view-toggle-btn" onclick="setView('map')">🗺 Map</button>
    </div>
    <button class="share-btn" id="copy-btn" style="display:none;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy link
    </button>
    <a href="/" class="btn-ghost">Map</a>
  </div>
</header>

<div id="loading-state">
  <div class="state-loading">
    <div class="spinner"></div>
    <div>Loading list…</div>
  </div>
</div>

<div id="list-meta-container" style="display:none;">
  <!-- filled by JS -->
</div>

<div id="view-list">
  <div class="list-view-inner">
    <div id="cards-container"></div>
  </div>
</div>

<div id="view-map">
  <div class="map-view-inner">
    <div id="list-map"></div>
    <div class="map-list-drawer" id="map-drawer"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://bnlnlfnrkwizviiabhex.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJubG5sZm5ya3dpenZpaWFiaGV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTgxODgsImV4cCI6MjA5MTMzNDE4OH0.GW0-kcOrcQ8YXyqvI6LbDnLM1IIQTkL1FFajJUrkfHk';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const slug = new URLSearchParams(window.location.search).get('slug');
let currentListId = null;
let isOwner = false;
let isLoggedIn = false;
let currentUser = null;
let listMap = null;
let mapMarkers = []; // [{marker, key}]
let allRestaurants = [];
let userLists    = []; // [{id, name, slug, is_public, keys: Set, notes: Map}]
let visitedKeys  = new Set();
let visitedDates = new Map(); // key → visited_on string

// ── Load ──────────────────────────────────────────────────────────────────────
async function load() {
  if (!slug) { showError('No list specified.'); return; }

  const { data: { session } } = await sb.auth.getSession();
  const user = session?.user ?? null;
  isLoggedIn = !!user;
  currentUser = user;

  const { data: lists, error: listErr } = await sb
    .from('lists')
    .select('id, name, description, is_public, user_id')
    .eq('slug', slug)
    .eq('is_public', true)
    .limit(1);

  if (listErr || !lists || lists.length === 0) {
    showError("This list doesn\u2019t exist or is private.");
    return;
  }

  const list = lists[0];
  currentListId = list.id;
  isOwner = user?.id === list.user_id;

  const { data: profile } = await sb
    .from('profiles').select('display_name, id, avatar_url').eq('id', list.user_id).limit(1).single();
  const ownerName   = profile?.display_name || 'Someone';
  const ownerAvatar = profile?.avatar_url
    ? `<img src="${profile.avatar_url}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:5px;" alt="">`
    : '';

  const { data: items } = await sb
    .from('list_items').select('restaurant_key, added_at, note')
    .eq('list_id', list.id).order('added_at', { ascending: false });

  const keys    = (items || []).map(i => i.restaurant_key);
  const noteMap = new Map((items || []).filter(i => i.note).map(i => [i.restaurant_key, i.note]));

  if (keys.length) {
    const { data: rests } = await sb
      .from('restaurants_with_summary')
      .select('key, name, city, state, country, photo_url, award_summary, lat, lng, website, address, yelp_url, michelin_url, cuisine_tags, price')
      .in('key', keys);
    allRestaurants = rests || [];
  }

  const keyOrder = new Map(keys.map((k, i) => [k, i]));
  allRestaurants.sort((a, b) => (keyOrder.get(a.key) ?? 999) - (keyOrder.get(b.key) ?? 999));

  const hasPins = allRestaurants.some(r => r.lat && r.lng);
  const shareUrl = window.location.href;

  // Page title
  document.title = `${list.name} — Delectable`;
  document.getElementById('header-sub').textContent = list.name;

  // Show copy button + view toggle
  const copyBtn = document.getElementById('copy-btn');
  copyBtn.style.display = '';
  copyBtn.addEventListener('click', () => copyLink(shareUrl));

  if (hasPins) {
    document.getElementById('view-toggle').style.display = '';
  }

  // Meta bar
  document.getElementById('list-meta-container').style.display = '';
  renderMetaBar(list, ownerName, ownerAvatar, allRestaurants.length);

  // Cards
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('cards-container').innerHTML = allRestaurants.length === 0
    ? `<div class="state-empty"><h2>No places yet</h2><p>This list doesn\u2019t have any restaurants yet.</p></div>`
    : allRestaurants.map((r, i) => cardHtml(r, noteMap.get(r.key), i + 1)).join('');

  // Load viewer's own lists + visits (for Save / Visited buttons)
  await Promise.all([loadUserLists(), loadVisits()]);

  // Map
  if (hasPins) initMap(allRestaurants, noteMap);
}

// ── User lists (for Save button) ─────────────────────────────────────────────
async function loadUserLists() {
  if (!currentUser) return;
  const { data: lists } = await sb.from('lists')
    .select('id, name, slug, is_public').eq('user_id', currentUser.id);
  if (!lists?.length) { userLists = []; return; }
  const listIds = lists.map(l => l.id);
  const { data: allItems } = await sb.from('list_items')
    .select('list_id, restaurant_key, note').in('list_id', listIds);
  const byList = new Map(listIds.map(id => [id, { keys: new Set(), notes: new Map() }]));
  for (const item of (allItems || [])) {
    const b = byList.get(item.list_id);
    if (!b) continue;
    b.keys.add(item.restaurant_key);
    if (item.note) b.notes.set(item.restaurant_key, item.note);
  }
  userLists = lists.map(l => ({
    id: l.id, name: l.name, slug: l.slug, is_public: l.is_public,
    keys: byList.get(l.id)?.keys ?? new Set(),
    notes: byList.get(l.id)?.notes ?? new Map(),
  }));
}

async function loadVisits() {
  if (!currentUser) return;
  const { data } = await sb.from('visits').select('restaurant_key, visited_on').eq('user_id', currentUser.id);
  visitedKeys  = new Set((data || []).map(v => v.restaurant_key));
  visitedDates = new Map((data || []).map(v => [v.restaurant_key, v.visited_on]));
}

// ── Meta bar ──────────────────────────────────────────────────────────────────
let currentList = null;
let currentOwnerName = '';
let currentOwnerAvatar = '';

function renderMetaBar(list, ownerName, ownerAvatar, count) {
  currentList = list;
  currentOwnerName = ownerName;
  currentOwnerAvatar = ownerAvatar;
  const descHtml = isOwner
    ? (list.description
        ? `<div class="list-description owner-editable" onclick="editDescription(this)">${escHtml(list.description)}</div>`
        : `<button class="add-desc-btn" onclick="editDescription(this)">+ Add a description\u2026</button>`)
    : (list.description ? `<div class="list-description">${escHtml(list.description)}</div>` : '');

  document.getElementById('list-meta-container').innerHTML = `
    <div class="list-meta-bar">
      <div class="list-title">${escHtml(list.name)}</div>
      <div class="list-meta">
        <span>By <a href="/profile.html?user=${escHtml(list.user_id)}">${ownerAvatar}${escHtml(ownerName)}</a></span>
        <span class="list-meta-dot">\u00b7</span>
        <span>${count} place${count !== 1 ? 's' : ''}</span>
      </div>
      <div id="desc-wrap">${descHtml}</div>
      ${(!isOwner && !isLoggedIn) ? `<div class="sign-in-nudge"><a onclick="signInToEdit(event)">Sign in</a> to edit notes</div>` : ''}
    </div>
  `;
}

function editDescription(el) {
  const wrap = document.getElementById('desc-wrap');
  const current = el.classList.contains('list-description') ? el.textContent : '';

  const ta = document.createElement('textarea');
  ta.className   = 'desc-input';
  ta.value       = current;
  ta.rows        = 3;
  ta.placeholder = 'Describe this list for visitors\u2026';
  ta.maxLength   = 400;
  wrap.innerHTML = '';
  wrap.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  function commit() { saveDescription(ta.value.trim(), current); }
  function restore() {
    currentList.description = current;
    renderMetaBar(currentList, currentOwnerName, currentOwnerAvatar, allRestaurants.length);
  }
  ta.addEventListener('blur', commit);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      ta.removeEventListener('blur', commit);
      commit();
    }
    if (e.key === 'Escape') {
      ta.removeEventListener('blur', commit);
      restore();
    }
  });
}

async function saveDescription(description, previous) {
  const { error } = await sb.from('lists').update({ description: description || null })
    .eq('id', currentListId);
  if (error) {
    currentList.description = previous;
  } else {
    currentList.description = description || null;
  }
  renderMetaBar(currentList, currentOwnerName, currentOwnerAvatar, allRestaurants.length);
}

// ── View toggle ───────────────────────────────────────────────────────────────
function setView(mode) {
  document.getElementById('view-list').style.display = mode === 'list' ? 'block' : 'none';
  document.getElementById('view-map').style.display  = mode === 'map'  ? 'block' : 'none';
  document.querySelectorAll('.view-toggle-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && mode === 'list') || (i === 1 && mode === 'map'));
  });
  if (mode === 'map' && listMap) {
    setTimeout(() => { listMap.invalidateSize(); }, 50);
  }
}

// ── Card HTML ─────────────────────────────────────────────────────────────────
function cardHtml(r, note, num) {
  const badge    = badgeHtml(r.award_summary);
  const location = [r.city, r.state || r.country].filter(Boolean).join(', ');
  const safeKey  = escHtml(r.key);

  const photo = r.photo_url
    ? `<img class="rc-photo" src="${escHtml(r.photo_url)}" alt="" loading="lazy">`
    : `<div class="rc-photo-placeholder">🍽</div>`;

  // Quick links
  const links = [];
  const mapsHref = r.address
    ? `https://maps.google.com/?q=${encodeURIComponent(r.address)}`
    : (r.lat && r.lng ? `https://maps.google.com/?q=${r.lat},${r.lng}` : null);
  if (mapsHref)      links.push(`<a class="rc-link" href="${escHtml(mapsHref)}" target="_blank" rel="noopener">📍 Google Maps</a>`);
  if (r.website)     links.push(`<a class="rc-link" href="${escHtml(r.website)}" target="_blank" rel="noopener">🌐 Website</a>`);
  if (r.yelp_url)    links.push(`<a class="rc-link" href="${escHtml(r.yelp_url)}" target="_blank" rel="noopener">⭐ Yelp</a>`);
  if (r.michelin_url) links.push(`<a class="rc-link" href="${escHtml(r.michelin_url)}" target="_blank" rel="noopener" style="color:#E4002B;">◆ Michelin</a>`);

  const noteSection = isOwner
    ? `<div class="card-note-wrap" data-key="${safeKey}">
        ${note
          ? `<div class="rc-note" onclick="editNote(this)">${escHtml(note)}</div>`
          : `<button class="add-note-btn" onclick="editNote(this)">+ Add note</button>`}
       </div>`
    : note ? `<div class="rc-note">${escHtml(note)}</div>` : '';

  const subParts = [];
  if (location) subParts.push(`<span>${escHtml(location)}</span>`);
  if (r.cuisine_tags) subParts.push(`<span style="color:var(--white-faint);">${escHtml(r.cuisine_tags)}</span>`);
  if (r.price) subParts.push(`<span style="color:var(--white-faint);">${escHtml(r.price)}</span>`);

  return `
    <div class="rich-card" data-key="${safeKey}" data-idx="${num - 1}">
      ${photo}
      <div class="rc-body">
        <div class="rc-name">${escHtml(r.name)}</div>
        <div class="rc-sub">
          ${badge}
          ${subParts.join('<span style="color:var(--border-light);">·</span>')}
        </div>
        ${links.length ? `<div class="rc-links">${links.join('')}</div>` : ''}
        <button class="save-to-list-btn" onclick="event.stopPropagation();openListPicker('${escHtml(r.key).replace(/'/g,"\\'")}')">＋ Save to list</button>
        ${noteSection}
        ${isOwner ? ownerActionsHtml(r.key) : ''}
      </div>
    </div>
  `;
}

function ownerActionsHtml(key) {
  const visited = visitedKeys.has(key);
  const date    = visitedDates.get(key);
  const safeKey = escHtml(key).replace(/'/g, "\\'");
  return `<div class="rc-actions" id="rc-actions-${escHtml(key)}">
    <button class="rc-action-btn ${visited ? 'visited-active' : ''}"
      onclick="toggleCardVisited('${safeKey}')">
      ${visited ? '✓ Visited' : 'Mark visited'}
    </button>
    ${visited && date ? `<span class="rc-visit-date">${date}</span>` : ''}
    <button class="rc-action-btn remove" onclick="removeFromList('${safeKey}')">Remove</button>
  </div>`;
}

async function toggleCardVisited(key) {
  const actionsEl = document.getElementById(`rc-actions-${key}`);
  if (visitedKeys.has(key)) {
    visitedKeys.delete(key);
    visitedDates.delete(key);
    await sb.from('visits').delete().eq('user_id', currentUser.id).eq('restaurant_key', key);
    if (actionsEl) actionsEl.outerHTML = ownerActionsHtml(key);
  } else {
    const today = new Date().toISOString().slice(0, 10);
    visitedKeys.add(key);
    visitedDates.set(key, today);
    await sb.from('visits').upsert({ user_id: currentUser.id, restaurant_key: key, visited_on: today });
    if (actionsEl) {
      actionsEl.outerHTML = ownerActionsHtml(key);
      // Insert date picker after the new actions row
      const newActionsEl = document.getElementById(`rc-actions-${key}`);
      if (newActionsEl) {
        const safeKey = escHtml(key).replace(/'/g, "\\'");
        const picker = document.createElement('div');
        picker.className = 'rc-date-row';
        picker.id = `rc-datepicker-${key}`;
        picker.innerHTML = `
          <input type="date" class="rc-date-input" id="rc-date-input-${escHtml(key)}" value="${today}" max="${today}">
          <button class="rc-date-save" onclick="saveCardVisitDate('${safeKey}')">Save date</button>
          <button class="rc-date-skip" onclick="document.getElementById('rc-datepicker-${escHtml(key)}').remove()">Skip</button>`;
        newActionsEl.after(picker);
      }
    }
  }
}

async function saveCardVisitDate(key) {
  const input = document.getElementById(`rc-date-input-${key}`);
  if (!input) return;
  const date = input.value;
  visitedDates.set(key, date);
  await sb.from('visits').update({ visited_on: date }).eq('user_id', currentUser.id).eq('restaurant_key', key);
  document.getElementById(`rc-datepicker-${key}`)?.remove();
  // Refresh date display in actions row
  const actionsEl = document.getElementById(`rc-actions-${key}`);
  if (actionsEl) actionsEl.outerHTML = ownerActionsHtml(key);
}

async function removeFromList(key) {
  await sb.from('list_items').delete().eq('list_id', currentListId).eq('restaurant_key', key);
  allRestaurants = allRestaurants.filter(r => r.key !== key);
  const card = document.querySelector(`.rich-card[data-key="${CSS.escape(key)}"]`);
  if (card) card.remove();
  // Update count in meta bar
  const countEl = document.querySelector('.list-meta span:last-child');
  if (countEl) countEl.textContent = `${allRestaurants.length} place${allRestaurants.length !== 1 ? 's' : ''}`;
}

function drawerBadgeHtml(summary) {
  if (!summary) return '';
  if (summary.includes('Winner'))       return `<span class="drawer-badge badge-winner">JBF Winner</span>`;
  if (summary.includes('Michelin Star') || summary.match(/★/)) return `<span class="drawer-badge badge-michelin">${escHtml(summary)}</span>`;
  if (summary.includes('texasmonthly') || summary.includes('Top 50')) return `<span class="drawer-badge badge-tm">TX Monthly</span>`;
  if (summary.includes('Nominee') || summary.includes('Semifinalist')) return `<span class="drawer-badge badge-other">${escHtml(summary)}</span>`;
  return '';
}

function badgeHtml(summary) {
  if (!summary) return '';
  if (summary.includes('Winner'))       return `<span class="rc-badge badge-winner">🥇 JBF Winner</span>`;
  if (summary.includes('Michelin Star') || summary.match(/★/)) return `<span class="rc-badge badge-michelin">${escHtml(summary)}</span>`;
  if (summary.includes('texasmonthly') || summary.includes('Top 50')) return `<span class="rc-badge badge-tm">🔥 TX Monthly</span>`;
  if (summary.includes('Nominee') || summary.includes('Semifinalist')) return `<span class="rc-badge badge-other">${escHtml(summary)}</span>`;
  return '';
}

// ── Note editing ──────────────────────────────────────────────────────────────
function editNote(el) {
  const wrap    = el.closest('[data-key]');
  const key     = wrap.dataset.key;
  const current = el.classList.contains('rc-note') ? el.textContent : '';

  const ta = document.createElement('textarea');
  ta.className   = 'note-input';
  ta.value       = current;
  ta.rows        = 2;
  ta.placeholder = 'Why\u2019d you add it? (optional)';
  ta.maxLength   = 200;
  wrap.innerHTML = '';
  wrap.appendChild(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  function commitNote() { saveNote(wrap, key, ta.value.trim()); }
  function restoreNote() {
    wrap.innerHTML = current
      ? `<div class="rc-note" onclick="editNote(this)">${escHtml(current)}</div>`
      : `<button class="add-note-btn" onclick="editNote(this)">+ Add note</button>`;
  }
  ta.addEventListener('blur', commitNote);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      ta.removeEventListener('blur', commitNote);
      commitNote();
    }
    if (e.key === 'Escape') {
      ta.removeEventListener('blur', commitNote);
      restoreNote();
    }
  });
}

async function saveNote(wrap, restaurantKey, note) {
  await sb.from('list_items').update({ note: note || null })
    .eq('list_id', currentListId).eq('restaurant_key', restaurantKey);
  wrap.innerHTML = note
    ? `<div class="rc-note" onclick="editNote(this)">${escHtml(note)}</div>`
    : `<button class="add-note-btn" onclick="editNote(this)">+ Add note</button>`;
}

// ── Popup HTML ────────────────────────────────────────────────────────────────
function popupHtml(r, note) {
  const location = [r.city, r.state || r.country].filter(Boolean).join(', ');
  const mapsHref = r.address
    ? `https://maps.google.com/?q=${encodeURIComponent(r.address)}`
    : (r.lat && r.lng ? `https://maps.google.com/?q=${r.lat},${r.lng}` : null);

  const links = [];
  if (mapsHref)       links.push(`<a href="${escHtml(mapsHref)}" target="_blank" rel="noopener">📍 Maps</a>`);
  if (r.website)      links.push(`<a href="${escHtml(r.website)}" target="_blank" rel="noopener">🌐 Website</a>`);
  if (r.yelp_url)     links.push(`<a href="${escHtml(r.yelp_url)}" target="_blank" rel="noopener">⭐ Yelp</a>`);
  if (r.michelin_url) links.push(`<a href="${escHtml(r.michelin_url)}" target="_blank" rel="noopener" style="color:#E4002B;">◆ Michelin</a>`);

  const badge = badgeHtml(r.award_summary);

  const header = r.photo_url
    ? `<div class="lp-photo-wrap">
        <img class="lp-photo" src="${escHtml(r.photo_url)}" alt="" onerror="this.parentElement.style.display='none'">
        <div class="lp-photo-gradient">
          <div class="lp-name">${escHtml(r.name)}</div>
          ${location ? `<div class="lp-loc">${escHtml(location)}</div>` : ''}
        </div>
       </div>`
    : `<div class="lp-header">
        <div class="lp-name">${escHtml(r.name)}</div>
        ${location ? `<div class="lp-loc">${escHtml(location)}</div>` : ''}
       </div>`;

  return `<div class="list-popup">
    ${header}
    <div class="lp-body">
      ${badge ? `<div class="lp-badge-row">${badge}</div>` : ''}
      ${links.length ? `<div class="lp-links">${links.join('')}</div>` : ''}
      ${note ? `<div class="lp-note">\u201c${escHtml(note)}\u201d</div>` : ''}
      <button onclick="openListPicker('${escHtml(r.key).replace(/'/g,"\\'")}');" class="lp-save-btn">\uFF0B Save to list</button>
    </div>
  </div>`;
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap(restaurants, noteMap = new Map()) {
  const pts = restaurants.filter(r => r.lat && r.lng);
  if (!pts.length) return;

  listMap = L.map('list-map', { zoomControl: true, scrollWheelZoom: true });

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles © Esri', maxZoom: 16 }
  ).addTo(listMap);
  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: 16, opacity: 0.8 }
  ).addTo(listMap);

  const icon = L.divIcon({
    className: '',
    html: `<div style="width:12px;height:12px;border-radius:50%;background:#FEA219;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.6);"></div>`,
    iconSize: [12, 12], iconAnchor: [6, 6],
  });

  const bounds = [];
  pts.forEach((r, i) => {
    const marker = L.marker([r.lat, r.lng], { icon });
    marker.bindPopup(popupHtml(r, noteMap.get(r.key)), { maxWidth: 280 });
    marker.addTo(listMap);
    mapMarkers.push({ marker, key: r.key });
    bounds.push([r.lat, r.lng]);
  });

  // Drawer
  document.getElementById('map-drawer').innerHTML = pts.map((r, i) => {
    const loc = [r.city, r.state || r.country].filter(Boolean).join(', ');
    const thumb = r.photo_url
      ? `<img class="drawer-thumb" src="${escHtml(r.photo_url)}" alt="" loading="lazy">`
      : `<div class="drawer-thumb-placeholder">🍽</div>`;
    const badge = drawerBadgeHtml(r.award_summary);
    return `
      <div class="drawer-item" data-key="${escHtml(r.key)}" onclick="flyToPin('${escHtml(r.key)}')">
        ${thumb}
        <div class="drawer-body">
          <div class="drawer-name">${escHtml(r.name)}</div>
          <div class="drawer-sub">
            ${badge}
            ${loc ? `<span class="drawer-loc">${escHtml(loc)}</span>` : ''}
          </div>
        </div>
        <button class="drawer-save-btn" onclick="event.stopPropagation();openListPicker('${escHtml(r.key).replace(/'/g,"\\'")}')">＋</button>
      </div>
    `;
  }).join('');

  setTimeout(() => {
    listMap.invalidateSize();
    if (bounds.length === 1) listMap.setView(bounds[0], 9);
    else listMap.fitBounds(bounds, { padding: [60, 60], maxZoom: 8 });
  }, 0);
}

function flyToPin(key) {
  const entry = mapMarkers.find(m => m.key === key);
  if (!entry) return;
  const latlng = entry.marker.getLatLng();
  listMap.flyTo(latlng, 15, { duration: 0.8 });
  entry.marker.openPopup();
  // Highlight drawer row
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  const row = document.querySelector(`.drawer-item[data-key="${CSS.escape(key)}"]`);
  if (row) { row.classList.add('active'); row.scrollIntoView({ block: 'nearest' }); }
}

// ── Share / copy ──────────────────────────────────────────────────────────────
async function copyLink(url) {
  await navigator.clipboard.writeText(url);
  const btn = document.getElementById('copy-btn');
  const orig = btn.innerHTML;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
}

async function signInToEdit(e) {
  e && e.preventDefault();
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
}

function showError(msg) {
  document.getElementById('loading-state').innerHTML = `
    <div class="state-error"><h2>List not found</h2><p>${escHtml(msg)}</p></div>`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>

<script>
let listPickerKey = null;
let lpExpandedNoteId = null;

function openListPicker(restaurantKey) {
  if (!currentUser) {
    sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    return;
  }
  listPickerKey = restaurantKey;
  lpRenderItems();
  const backdrop = document.getElementById('list-picker-backdrop');
  const sheet    = document.getElementById('list-picker-sheet');
  backdrop.style.display = 'block';
  sheet.style.display    = 'block';
  requestAnimationFrame(() => { sheet.style.transform = 'translateY(0)'; });
}

function closeListPicker() {
  const sheet    = document.getElementById('list-picker-sheet');
  const backdrop = document.getElementById('list-picker-backdrop');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    sheet.style.display    = 'none';
    backdrop.style.display = 'none';
    lpCancelNew();
    lpExpandedNoteId = null;
  }, 300);
  listPickerKey = null;
}

function lpRenderItems() {
  const container = document.getElementById('list-picker-items');
  if (!userLists.length) {
    container.innerHTML = `<div style="padding:12px 20px;font-size:0.82rem;color:rgba(255,255,255,0.4);">No lists yet — create one below.</div>`;
    return;
  }
  container.innerHTML = userLists.map(list => {
    const checked  = list.keys.has(listPickerKey);
    const note     = list.notes.get(listPickerKey) || '';
    const expanded = checked && lpExpandedNoteId === list.id;
    const notePreview = checked && note && !expanded
      ? `<div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">${lpEscHtml(note)}</div>`
      : '';
    const noteField = expanded ? `
      <div style="padding:0 20px 10px;" onclick="event.stopPropagation()">
        <textarea id="lp-note-${lpEscJs(list.id)}" rows="2" maxlength="200"
          placeholder="Why\u2019d you add it? (optional)"
          style="width:100%;background:#141414;border:1px solid #444;border-radius:8px;color:#fff;font-family:inherit;font-size:0.82rem;padding:8px 10px;outline:none;resize:none;line-height:1.4;"
          onblur="lpSaveNote('${lpEscJs(list.id)}','${lpEscJs(listPickerKey)}')"
        >${lpEscHtml(note)}</textarea>
      </div>` : '';
    return `<div>
      <button onclick="${checked ? `lpExpandNote('${lpEscJs(list.id)}')` : `lpToggle('${lpEscJs(list.id)}','${lpEscJs(listPickerKey)}')`}"
        style="display:flex;align-items:center;gap:12px;width:100%;background:transparent;border:none;padding:10px 20px;cursor:pointer;text-align:left;color:#fff;font-family:inherit;">
        <span style="width:20px;height:20px;border-radius:4px;border:1.5px solid ${checked ? '#FEA219' : '#444'};flex-shrink:0;
          background:${checked ? 'rgba(254,162,25,0.15)' : 'transparent'};display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:#FEA219;"
          onclick="${checked ? `event.stopPropagation();lpToggle('${lpEscJs(list.id)}','${lpEscJs(listPickerKey)}')` : ''}">${checked ? '✓' : ''}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:0.88rem;">${lpEscHtml(list.name)}</div>
          ${notePreview}
        </div>
      </button>
      ${noteField}
    </div>`;
  }).join('');
}

async function lpToggle(listId, restaurantKey) {
  const list = userLists.find(l => l.id === listId);
  if (!list) return;
  if (list.keys.has(restaurantKey)) {
    list.keys.delete(restaurantKey);
    list.notes.delete(restaurantKey);
    lpExpandedNoteId = null;
    await sb.from('list_items').delete().eq('list_id', listId).eq('restaurant_key', restaurantKey);
  } else {
    list.keys.add(restaurantKey);
    await sb.from('list_items').upsert({ list_id: listId, restaurant_key: restaurantKey });
  }
  lpRenderItems();
}

function lpExpandNote(listId) {
  lpExpandedNoteId = lpExpandedNoteId === listId ? null : listId;
  lpRenderItems();
  if (lpExpandedNoteId) {
    setTimeout(() => { const ta = document.getElementById(`lp-note-${listId}`); if (ta) ta.focus(); }, 50);
  }
}

async function lpSaveNote(listId, restaurantKey) {
  const input = document.getElementById(`lp-note-${listId}`);
  if (!input) return;
  const note = input.value.trim();
  const list = userLists.find(l => l.id === listId);
  if (list) { note ? list.notes.set(restaurantKey, note) : list.notes.delete(restaurantKey); }
  await sb.from('list_items').update({ note: note || null }).eq('list_id', listId).eq('restaurant_key', restaurantKey);
  lpExpandedNoteId = null;
  lpRenderItems();
}

function lpShowNewForm() {
  document.getElementById('list-picker-new-btn').style.display  = 'none';
  document.getElementById('list-picker-new-form').style.display = 'block';
  document.getElementById('list-picker-new-input').focus();
}
function lpCancelNew() {
  const input = document.getElementById('list-picker-new-input');
  if (input) input.value = '';
  const form = document.getElementById('list-picker-new-form');
  const btn  = document.getElementById('list-picker-new-btn');
  if (form) form.style.display = 'none';
  if (btn)  btn.style.display  = 'flex';
}
async function lpCreateAndAdd() {
  const input = document.getElementById('list-picker-new-input');
  const name  = input?.value.trim();
  if (!name || !currentUser) return;
  const sfx  = Math.random().toString(36).slice(2, 6);
  const slug  = name.toLowerCase().replace(/[^a-z0-9\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,40) + '-' + sfx;
  const { data: newList, error } = await sb.from('lists')
    .insert({ user_id: currentUser.id, name, slug, is_public: true }).select().single();
  if (error || !newList) return;
  await sb.from('list_items').upsert({ list_id: newList.id, restaurant_key: listPickerKey });
  userLists.push({ id: newList.id, name: newList.name, slug: newList.slug, is_public: true,
    keys: new Set([listPickerKey]), notes: new Map() });
  lpCancelNew();
  lpRenderItems();
}
function lpEscJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function lpEscHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
