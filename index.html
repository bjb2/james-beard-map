    // Visited / Want to Go always visible outside tabs
    html += buildCommButtons(favKey(a));
    html += `</div></div>`;
    return html;
  }

  // ── Texas Monthly popup ────────────────────────────────────────────────────
  if (isTMOnly) {
    const a = awards[0];
    // Collect all years for this restaurant
    const tmYears = [...new Set(awards.map(x => x.tmYear).filter(Boolean))].sort();
    const location = [a.city, a.state].filter(Boolean).join(', ');
    const mapsUrl = buildFallbackMapsUrl(a);
    const photo = a.googlePhoto || null;
    const isClosed = a.businessStatus === 'CLOSED_PERMANENTLY' || a.businessStatus === 'CLOSED_TEMPORARILY';

    let html = `<div class="jb-popup">`;

    if (photo) {
      html += `<div class="popup-header" style="padding:0;position:relative;overflow:hidden;min-height:90px;">
        <img src="${escHtml(photo)}" onerror="this.parentElement.style.minHeight='0';this.remove()"
          style="width:100%;height:110px;object-fit:cover;display:block;">
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(26,9,0,0.9));padding:8px 14px 6px;">
          <div class="popup-name">${escHtml(a.restaurant)}</div>
          <div class="popup-restaurant">${escHtml(location)}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="popup-header">
        <div class="popup-name">${escHtml(a.restaurant)}</div>
        <div class="popup-restaurant">${escHtml(location)}</div>
      </div>`;
    }

    html += `<div class="popup-body">
      <div class="popup-tabs">
        <button class="popup-tab-btn active" data-tab="info"      onclick="switchPopupTab('info')">Info</button>
        <button class="popup-tab-btn"        data-tab="community" onclick="switchPopupTab('community')">Community</button>
      </div>`;

    html += `<div class="popup-tab-content active" data-tab="info">`;

    if (a.businessStatus === 'CLOSED_PERMANENTLY') {
      html += `<div style="font-family:sans-serif;font-size:0.72rem;color:#ff6b6b;margin-bottom:6px;">⚠ Permanently closed</div>`;
    } else if (a.businessStatus === 'CLOSED_TEMPORARILY') {
      html += `<div style="font-family:sans-serif;font-size:0.72rem;color:#f0a500;margin-bottom:6px;">⚠ Temporarily closed</div>`;
    }

    html += `<div style="margin-bottom:8px;">
      <span style="font-family:sans-serif;font-size:0.75rem;background:#1a6fa8;color:#fff;padding:2px 8px;border-radius:4px;">🔥 Texas Monthly Top 50 BBQ</span>
    </div>`;
    html += `<div style="font-family:sans-serif;font-size:0.72rem;color:rgba(255,255,255,0.6);margin-bottom:8px;">Listed: ${tmYears.join(', ')}</div>`;

    const links = [];
    if (mapsUrl)   links.push(`<a href="${escHtml(mapsUrl)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">📍 Maps</a>`);
    if (a.website) links.push(`<a href="${escHtml(a.website)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">🌐 Website</a>`);
    if (links.length) html += `<div style="display:flex;gap:12px;flex-wrap:wrap;">${links.join('')}</div>`;

    html += `</div>`;
    html += `<div class="popup-tab-content" data-tab="community">
      <div id="comm-section" style="min-height:60px;">
        <div style="font-family:sans-serif;font-size:0.72rem;color:var(--white-faint);padding:12px 0;">Tap to load community notes…</div>
      </div>
    </div>`;
    html += buildCommButtons(favKey(a));
    html += `</div></div>`;
    return html;
  }

  // ── JBF (or mixed JBF+Michelin) popup ─────────────────────────────────────
  const city = awards[0].city;
  const state = awards[0].state;

  // Group by restaurant
  const byRestaurant = new Map();
  for (const a of awards) {
    if (a.source === 'michelin' || a.source === 'texasmonthly') continue; // show JBF entries only
    const key = a.restaurant || a.name || '?';
    if (!byRestaurant.has(key)) byRestaurant.set(key, { awards: [], meta: a });
    byRestaurant.get(key).awards.push(a);
    if (a.image || a.website) byRestaurant.get(key).meta = a;
  }

  const isPrecise = loc.awards[0].precise && byRestaurant.size === 1;
  const firstMeta = [...byRestaurant.values()][0]?.meta || awards[0];
  const yelpDetail = firstMeta.yelpDetail || null;

  // Michelin / TM records co-located at this pin
  const michelinRecord = awards.find(a => a.source === 'michelin');
  const tmRecord       = awards.find(a => a.source === 'texasmonthly');
  const michelinAward   = firstMeta.michelinAward   || michelinRecord?.michelinAward   || null;
  const michelinUrl     = firstMeta.michelinUrl     || michelinRecord?.michelinUrl     || null;
  const greenStar       = firstMeta.greenStar       || michelinRecord?.greenStar       || false;
  const tmYears         = tmRecord ? [...new Set(awards.filter(a => a.source === 'texasmonthly').map(a => a.tmYear).filter(Boolean))].sort() : null;
  const googlePhoto     = firstMeta.googlePhoto || michelinRecord?.googlePhoto || null;
  const businessStatus  = firstMeta.businessStatus || michelinRecord?.businessStatus || null;

  const img = googlePhoto || yelpDetail?.image || firstMeta.image;
  const website = firstMeta.website || michelinRecord?.website || null;
  const description = firstMeta.description;
  const mapsUrl = firstMeta.mapsUrl || buildFallbackMapsUrl(firstMeta);

  let html = `<div class="jb-popup">`;

  if (img) {
    html += `<div class="popup-header" style="padding:0;position:relative;overflow:hidden;min-height:90px;">
      <img src="${escHtml(img)}" onerror="this.parentElement.style.minHeight='0';this.remove()"
        style="width:100%;height:110px;object-fit:cover;display:block;">
      <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(26,9,0,0.9));padding:8px 14px 6px;">
        <div class="popup-name">${escHtml(isPrecise ? (firstMeta.restaurant || firstMeta.name || city) : city+', '+state)}</div>
        <div class="popup-restaurant">${escHtml(isPrecise ? city+', '+state : awards.length+' award'+(awards.length!==1?'s':'')+' shown')}</div>
      </div>
    </div>`;
  } else {
    html += `<div class="popup-header">
      <div class="popup-name">${escHtml(isPrecise ? (firstMeta.restaurant || firstMeta.name || city) : city+', '+state)}</div>
      <div class="popup-restaurant">${escHtml(isPrecise ? city+', '+state : awards.length+' award'+(awards.length!==1?'s':'')+' shown')}</div>
    </div>`;
  }

  html += `<div class="popup-body">
    <div class="popup-tabs">
      <button class="popup-tab-btn active" data-tab="info"      onclick="switchPopupTab('info')">Info</button>
      <button class="popup-tab-btn"        data-tab="community" onclick="switchPopupTab('community')">Community</button>
    </div>`;

  // ── Info tab ────────────────────────────────────────────────────────────
  html += `<div class="popup-tab-content active" data-tab="info">`;

  if (description) {
    html += `<div style="font-size:0.75rem;color:rgba(255,255,255,0.5);font-family:sans-serif;margin-bottom:8px;line-height:1.4;font-style:italic;">${escHtml(description.substring(0, 160))}…</div>`;
  }

  if (michelinAward) {
    html += `<div style="margin-bottom:8px;">${michelinBadge(michelinAward)}`;
    if (greenStar) html += ` <span style="font-family:sans-serif;font-size:0.72rem;color:#2ecc71;">🌿 Green Star</span>`;
    html += `</div>`;
  }

  if (tmYears) {
    html += `<div style="margin-bottom:8px;">
      <span style="font-family:sans-serif;font-size:0.75rem;background:#1a6fa8;color:#fff;padding:2px 8px;border-radius:4px;">🔥 Texas Monthly Top 50 BBQ</span>
      <span style="font-family:sans-serif;font-size:0.72rem;color:rgba(255,255,255,0.5);margin-left:6px;">${tmYears.join(', ')}</span>
    </div>`;
  }

  if (businessStatus === 'CLOSED_PERMANENTLY' || yelpDetail?.isClosed) {
    html += `<div style="font-family:sans-serif;font-size:0.72rem;color:#ff6b6b;margin-bottom:6px;">⚠ Permanently closed</div>`;
  } else if (businessStatus === 'CLOSED_TEMPORARILY') {
    html += `<div style="font-family:sans-serif;font-size:0.72rem;color:#f0a500;margin-bottom:6px;">⚠ Temporarily closed</div>`;
  }

  if (yelpDetail) {
    const parts = [];
    if (yelpDetail.rating) parts.push(`<span style="color:#FEA219;font-weight:700;">⭐ ${yelpDetail.rating}</span>`);
    if (yelpDetail.price)  parts.push(`<span style="color:rgba(255,255,255,0.7);">${escHtml(yelpDetail.price)}</span>`);
    if (parts.length) html += `<div style="display:flex;align-items:center;gap:8px;font-family:sans-serif;font-size:0.8rem;margin-bottom:8px;">${parts.join(' · ')}</div>`;
  }

  const links = [];
  if (mapsUrl) links.push(`<a href="${escHtml(mapsUrl)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">📍 Maps</a>`);
  if (website) links.push(`<a href="${escHtml(website)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">🌐 Website</a>`);
  if (yelpDetail?.menuUrl) links.push(`<a href="${escHtml(yelpDetail.menuUrl)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">📋 Menu</a>`);
  if (yelpDetail?.url) links.push(`<a href="${escHtml(yelpDetail.url)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">⭐ Yelp</a>`);
  if (michelinUrl) links.push(`<a href="${escHtml(michelinUrl)}" target="_blank" rel="noopener" style="color:#E4002B;font-size:0.75rem;font-family:sans-serif;text-decoration:none;">◆ Michelin</a>`);
  if (links.length) html += `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #3a2510;">${links.join('')}</div>`;

  html += `<div class="popup-awards-list">`;
  for (const [restaurant, { awards: rawards, meta }] of byRestaurant) {
    html += `<div class="popup-award-item">`;
    if (!isPrecise) {
      const restLinks = [];
      if (meta.mapsUrl || buildFallbackMapsUrl(meta)) restLinks.push(`<a href="${escHtml(meta.mapsUrl || buildFallbackMapsUrl(meta))}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.68rem;font-family:sans-serif;text-decoration:none;">📍</a>`);
      if (meta.website) restLinks.push(`<a href="${escHtml(meta.website)}" target="_blank" rel="noopener" style="color:#FEA219;font-size:0.68rem;font-family:sans-serif;text-decoration:none;">🌐</a>`);
      html += `<div class="popup-award-title" style="display:flex;align-items:center;gap:6px;">${escHtml(restaurant)} ${restLinks.join(' ')}</div>`;
    }

    // Group by status+category so multiple years/chefs collapse into one row
    const groups = new Map();
    for (const a of rawards) {
      const gk = `${a.status}||${a.category || ''}`;
      if (!groups.has(gk)) groups.set(gk, { status: a.status, category: a.category || '', years: new Set(), chefs: new Set() });
      const g = groups.get(gk);
      if (a.year) g.years.add(String(a.year));
      if (a.name && a.name !== restaurant) g.chefs.add(a.name);
    }

    for (const g of groups.values()) {
      const badge  = g.status === 'Winner' ? '🥇' : g.status === 'Semifinalist' ? '🥈' : '🥉';
      const years  = [...g.years].sort((a, b) => b - a);
      const yearStr = years.length > 1
        ? (Number(years[0]) - Number(years[years.length - 1]) === years.length - 1
            ? `${years[years.length - 1]}–${years[0]}`   // consecutive → range
            : years.join(', '))
        : (years[0] || '');
      const chefStr = [...g.chefs].join(', ');
      html += `<div class="popup-award-meta">
        <span>${badge} ${escHtml(g.status)}</span>
        <span>${escHtml(g.category)}</span>
        ${yearStr ? `<span>${escHtml(yearStr)}</span>` : ''}
      </div>`;
      if (chefStr) html += `<div class="popup-award-meta" style="color:rgba(255,255,255,0.4);">${escHtml(chefStr)}</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;  // popup-awards-list
  html += `</div>`;  // info tab

  // ── Community tab ─────────────────────────────────────────────────────
  html += `<div class="popup-tab-content" data-tab="community">
    <div id="comm-section" style="min-height:60px;">
      <div style="font-family:sans-serif;font-size:0.72rem;color:var(--white-faint);padding:12px 0;">Loading community notes…</div>
    </div>
  </div>`;

  // Visited / Want to Go always visible outside tabs
  html += buildCommButtons(favKey(firstMeta));
  html += `</div></div></div>`;
  return html;
}

function buildFallbackMapsUrl(a) {
  if (!a) return null;
  const name = a.restaurant || a.name || '';
  const q = encodeURIComponent(`${name} ${a.city || ''} ${a.state || ''}`.trim());
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}

// ── Sidebar results list ─────────────────────────────────────────────────────
function updateSidebar() {
  const panel = document.getElementById('results-panel');

  const statusOrder = { Winner: 0, Semifinalist: 1, Nominee: 2 };

  const sorted = [...filteredAwards].sort((a, b) => {
    if (nearbyMode && userLat !== null) {
      const da = distanceMiles(userLat, userLng, a.lat, a.lng);
      const db = distanceMiles(userLat, userLng, b.lat, b.lng);
      if (Math.abs(da - db) > 0.5) return da - db;
    }
    const s = (statusOrder[a.status] || 2) - (statusOrder[b.status] || 2);
    if (s !== 0) return s;
    return parseInt(b.year) - parseInt(a.year);
  });

  // Show max 300 in sidebar
  const display = sorted.slice(0, 300);

  const items = display.map(a => {
    const isMichelin = a.source === 'michelin';
    const isTM       = a.source === 'texasmonthly';
    const badgeClass = isMichelin ? 'badge-michelin'
      : isTM ? 'badge-tm'
      : a.status === 'Winner' ? 'badge-winner'
      : a.status === 'Semifinalist' ? 'badge-semifinalist' : 'badge-nominee';
    const badgeText = isMichelin
      ? ({ '3 Stars':'★★★ 3 Stars','2 Stars':'★★ 2 Stars','1 Star':'★ 1 Star','Bib Gourmand':'Ⓑ Bib Gourmand','Selected':'◆ Selected' }[a.michelinAward] || '◆ Michelin')
      : isTM ? '🔥 TX Top 50 BBQ'
      : a.status === 'Winner' ? '🥇 Winner' : a.status === 'Semifinalist' ? '🥈 Semifinalist' : '🥉 Nominee';
    const displayName = a.restaurant || a.name || '?';
    const displayRest = (!isMichelin && !isTM) && a.name && a.name !== a.restaurant ? a.restaurant : '';
    const locText = isMichelin
      ? [a.city, a.country].filter(Boolean).join(', ')
      : [a.city, a.state].filter(Boolean).join(', ');
    const yearText = isTM ? a.tmYear : a.year;
    const distText = (nearbyMode && userLat !== null)
      ? ` · ${distanceMiles(userLat, userLng, a.lat, a.lng).toFixed(1)} mi` : '';

    return `<div class="result-item" data-lat="${a.lat}" data-lng="${a.lng}">
      <div class="result-name">${escHtml(displayName)}</div>
      ${displayRest ? `<div class="result-restaurant">${escHtml(displayRest)}</div>` : ''}
      <div class="result-meta">
        <span class="result-badge ${badgeClass}">${badgeText}</span>
        <span class="result-loc">${escHtml(locText)}${distText}</span>
        ${yearText ? `<span class="result-year">${yearText}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  const nearbyBanner = nearbyMode
    ? `<div style="background:#FEA219;color:#fff;padding:6px 10px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border-radius:2px;margin-bottom:6px;">📍 Nearby mode: within ${radiusMiles} mi of you</div>`
    : '';
  panel.innerHTML = `${nearbyBanner}<div class="result-count">${filteredAwards.length.toLocaleString()} results${filteredAwards.length > 300 ? ' (top 300 shown)' : ''}</div>${items}`;

  // Click to fly to location and open popup
  panel.querySelectorAll('.result-item').forEach(el => {
    el.addEventListener('click', () => {
      const lat = parseFloat(el.dataset.lat);
      const lng = parseFloat(el.dataset.lng);
      map.flyTo([lat, lng], 15, { duration: 0.8 });
      map.once('moveend', () => {
        const marker = markers.find(m => {
          const ll = m.getLatLng();
          return Math.abs(ll.lat - lat) < 0.0001 && Math.abs(ll.lng - lng) < 0.0001;
        });
        if (marker) markerCluster.zoomToShowLayer(marker, () => marker.openPopup());
      });
    });
  });
}

// ── Geolocation ──────────────────────────────────────────────────────────────
function toggleNearbyMode() {
  if (nearbyMode) {
    // Turn off
    nearbyMode = false;
    const btn = document.getElementById('locate-btn');
    btn.textContent = '📍 Find Awards Near Me';
    btn.style.background = '';
    btn.style.color = '';
    document.getElementById('radius-control').classList.remove('visible');
    document.getElementById('zip-input').value = '';
    document.getElementById('zip-error').style.display = 'none';
    if (locationCircle) { map.removeLayer(locationCircle); locationCircle = null; }
    if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
    applyFilters();
  }
}

document.getElementById('locate-btn').addEventListener('click', () => {
  if (nearbyMode) {
    toggleNearbyMode();
    return;
  }

  if (!navigator.geolocation) {
    alert('Geolocation is not supported by your browser.');
    return;
  }

  const btn = document.getElementById('locate-btn');
  btn.textContent = '📍 Locating…';
  btn.disabled = true;

  navigator.geolocation.getCurrentPosition(pos => {
    btn.disabled = false;
    document.getElementById('zip-input').value = '';
    document.getElementById('zip-error').style.display = 'none';
    activateNearby(pos.coords.latitude, pos.coords.longitude, 'Me');
    btn.textContent = '📍 Near Me (active)';
    btn.style.background = '#FEA219';
    btn.style.color = '#ffffff';
  }, err => {
    btn.textContent = '📍 Find Awards Near Me';
    btn.disabled = false;
    alert('Could not get your location: ' + err.message);
  }, { timeout: 15000 });
});

// ── Zip code location ────────────────────────────────────────────────────────
function activateNearby(lat, lng, label) {
  userLat = lat;
  userLng = lng;
  nearbyMode = true;
  document.getElementById('locate-btn').textContent = '📍 Near Me (active)';
  document.getElementById('locate-btn').style.background = '';
  document.getElementById('locate-btn').style.color = '';
  document.getElementById('radius-control').classList.add('visible');
  showLocationCircle();
  map.flyTo([lat, lng], 9, { duration: 1 });
  applyFilters();
}

async function lookupZip(zip) {
  const zipError = document.getElementById('zip-error');
  const zipGo    = document.getElementById('zip-go');
  zipError.style.display = 'none';
  zipGo.textContent = '…';
  zipGo.disabled = true;

  try {
    const res = await fetch(`https://api.zippopotam.us/us/${zip}`);
    if (res.status === 404) {
      zipError.textContent = 'ZIP code not found.';
      zipError.style.display = 'block';
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const place = data.places?.[0];
    if (!place) throw new Error('No location data');
    const lat  = parseFloat(place.latitude);
    const lng  = parseFloat(place.longitude);
    const name = `${place['place name']}, ${place['state abbreviation']}`;
    activateNearby(lat, lng, name);
    // Reflect city name in the locate button
    document.getElementById('locate-btn').textContent = `📍 Near ${name} (active)`;
    document.getElementById('locate-btn').style.background = '#FEA219';
    document.getElementById('locate-btn').style.color = '#ffffff';
  } catch (e) {
    zipError.textContent = 'Couldn\'t look up that ZIP code, try again.';
    zipError.style.display = 'block';
  } finally {
    zipGo.textContent = 'Go';
    zipGo.disabled = false;
  }
}

document.getElementById('zip-go').addEventListener('click', () => {
  const zip = document.getElementById('zip-input').value.trim();
  if (!/^\d{5}$/.test(zip)) {
    const zipError = document.getElementById('zip-error');
    zipError.textContent = 'Enter a 5-digit US ZIP code.';
    zipError.style.display = 'block';
    return;
  }
  lookupZip(zip);
});

document.getElementById('zip-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('zip-go').click();
});

const radiusSlider = document.getElementById('radius-slider');
const radiusVal = document.getElementById('radius-val');
radiusSlider.addEventListener('input', () => {
  radiusMiles = parseInt(radiusSlider.value);
  radiusVal.textContent = `${radiusMiles} mi`;
  if (nearbyMode) {
    showLocationCircle();
    applyFilters();
  }
});

function showLocationCircle() {
  if (locationCircle) map.removeLayer(locationCircle);
  if (locationMarker) map.removeLayer(locationMarker);

  const radiusMeters = radiusMiles * 1609.34;

  locationCircle = L.circle([userLat, userLng], {
    radius: radiusMeters,
    color: '#FEA219',
    fillColor: '#FEA219',
    fillOpacity: 0.06,
    weight: 1.5,
    dashArray: '6, 4'
  }).addTo(map);

  locationMarker = L.circleMarker([userLat, userLng], {
    radius: 6,
    color: '#fff',
    fillColor: '#FEA219',
    fillOpacity: 1,
    weight: 2
  }).addTo(map).bindPopup('📍 Your location');
}

// ── Utilities ────────────────────────────────────────────────────────────────
function distanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// ── Collapsible sidebar sections ─────────────────────────────────────────────
(function() {
  document.querySelectorAll('.sidebar-section.collapsible').forEach(section => {
    const h3 = section.querySelector('h3');
    h3.addEventListener('click', () => section.classList.toggle('collapsed'));
  });

  // Collapse filters + near me by default on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('section-nearme').classList.add('collapsed');
    document.getElementById('section-filters').classList.add('collapsed');
  }
})();

// ── Mobile sidebar ───────────────────────────────────────────────────────────
(function() {
  const toggle = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');

  function openSidebar() {
    sidebar.classList.add('open');
    backdrop.classList.add('visible');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    backdrop.classList.remove('visible');
  }

  toggle.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  backdrop.addEventListener('click', closeSidebar);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

  // Close sidebar on result click (mobile UX — show the map)
  document.getElementById('results-panel').addEventListener('click', e => {
    if (e.target.closest('.result-item') && window.innerWidth <= 768) closeSidebar();
  });
})();


// ── Logo font animation ──────────────────────────────────────────────────────
function animateLogo() {
  const steps = [
    { font: "'Dancing Script', cursive",    size: '1.5rem', weight: '700', spacing: '0.02em' },
    { font: "'Pacifico', cursive",           size: '1.2rem', weight: '400', spacing: '0.01em' },
    { font: "'Raleway', sans-serif",         size: '1.1rem', weight: '300', spacing: '0.22em' },
    { font: "'Playfair Display', serif",     size: '1.3rem', weight: '700', spacing: '0.04em' },
    { font: "'Playfair Display', serif",      size: '1.3rem', weight: '700', spacing: '0.03em' },
  ];

  const el = document.querySelector('.header-wordmark h1');
  if (!el) return;

  el.style.transition = 'opacity 0.18s ease';

  let i = 0;
  function next() {
    if (i >= steps.length) return;
    const s = steps[i];
    el.style.opacity = '0';
    setTimeout(() => {
      el.style.fontFamily    = s.font;
      el.style.fontSize      = s.size;
      el.style.fontWeight    = s.weight;
      el.style.letterSpacing = s.spacing;
      el.style.opacity = '1';
      i++;
      // Linger longer on the final font
      if (i < steps.length) setTimeout(next, i === steps.length - 1 ? 500 : 320);
    }, 180);
  }

  // Small delay so fonts are fetched before we start
  setTimeout(next, 400);
}

// ── Init ────────────────────────────────────────────────────────────────────
initMap();
loadData();
animateLogo();
initAuth();
</script>

<!-- ── List Picker Sheet ──────────────────────────────────────────────────── -->
<div id="list-picker-backdrop" style="
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;
" onclick="closeListPicker()"></div>

<div id="list-picker-sheet" style="
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:#1c1c1c;border-top:1px solid #333;border-radius:14px 14px 0 0;
  z-index:2001;max-height:60vh;overflow-y:auto;
  transform:translateY(100%);transition:transform 0.3s ease;
  font-family:'Helvetica Neue',Arial,sans-serif;
">
  <div style="padding:12px 20px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2a2a;">
    <span style="font-size:0.88rem;font-weight:600;color:#fff;">Add to list</span>
    <button onclick="closeListPicker()" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1;">×</button>
  </div>
  <div id="list-picker-items" style="padding:8px 0;"></div>
  <div style="padding:8px 20px 24px;border-top:1px solid #2a2a2a;">
    <div id="list-picker-new-form" style="display:none;">
      <input id="list-picker-new-input" type="text" placeholder="List name…" maxlength="60" style="
        width:100%;background:#141414;border:1px solid #333;border-radius:8px;
        color:#fff;font-family:inherit;font-size:0.85rem;padding:8px 12px;
        outline:none;margin-bottom:8px;
      ">
      <div style="display:flex;gap:8px;">
        <button onclick="createAndAddToList()" style="
          flex:1;background:#FEA219;border:none;border-radius:8px;
          color:#0d0d0d;font-family:inherit;font-size:0.8rem;font-weight:700;
          padding:8px;cursor:pointer;
        ">Create & Add</button>
        <button onclick="cancelNewList()" style="
          background:transparent;border:1px solid #333;border-radius:8px;
          color:rgba(255,255,255,0.5);font-family:inherit;font-size:0.8rem;
          padding:8px 14px;cursor:pointer;
        ">Cancel</button>
      </div>
    </div>
    <button id="list-picker-new-btn" onclick="showNewListForm()" style="
      display:flex;align-items:center;gap:8px;width:100%;
      background:transparent;border:none;color:rgba(255,255,255,0.5);
      font-family:inherit;font-size:0.85rem;cursor:pointer;padding:6px 0;
    ">
      <span style="font-size:1.1rem;line-height:1;">+</span> New list…
    </button>
  </div>
</div>

<script>
let listPickerKey = null;

function openListPicker(restaurantKey) {
  if (!currentUser) { showAuthNudge(); return; }
  listPickerKey = restaurantKey;
  renderListPickerItems();

  const backdrop = document.getElementById('list-picker-backdrop');
  const sheet    = document.getElementById('list-picker-sheet');
  backdrop.style.display = 'block';
  sheet.style.display    = 'block';
  requestAnimationFrame(() => {
    sheet.style.transform = 'translateY(0)';
  });
}

function closeListPicker() {
  const sheet    = document.getElementById('list-picker-sheet');
  const backdrop = document.getElementById('list-picker-backdrop');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(() => {
    sheet.style.display    = 'none';
    backdrop.style.display = 'none';
    cancelNewList();
    expandedNoteListId = null;
  }, 300);
  listPickerKey = null;
}

let expandedNoteListId = null; // which list row has its note field open

function renderListPickerItems() {
  const container = document.getElementById('list-picker-items');
  if (!userLists.length) {
    container.innerHTML = `<div style="padding:12px 20px;font-size:0.82rem;color:rgba(255,255,255,0.4);">No lists yet — create one below.</div>`;
    return;
  }
  container.innerHTML = userLists.map(list => {
    const checked  = list.keys.has(listPickerKey);
    const note     = list.notes.get(listPickerKey) || '';
    const expanded = checked && expandedNoteListId === list.id;
    const notePreview = checked && note && !expanded
      ? `<div style="font-size:0.72rem;color:rgba(255,255,255,0.4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">${escHtmlInline(note)}</div>`
      : '';
    const noteField = expanded ? `
      <div style="padding:0 20px 10px;" onclick="event.stopPropagation()">
        <textarea id="note-input-${escJs(list.id)}"
          placeholder="Why\u2019d you add it? (optional)"
          maxlength="200"
          rows="2"
          style="
            width:100%;background:#141414;border:1px solid #444;border-radius:8px;
            color:#fff;font-family:inherit;font-size:0.82rem;padding:8px 10px;
            outline:none;resize:none;line-height:1.4;margin-bottom:8px;display:block;
          "
        >${escHtmlInline(note)}</textarea>
        <div style="display:flex;gap:8px;">
          <button onclick="saveListNote('${escJs(list.id)}','${escJs(listPickerKey)}')" style="
            flex:1;background:#FEA219;border:none;border-radius:8px;
            color:#0d0d0d;font-family:inherit;font-size:0.8rem;font-weight:700;
            padding:8px;cursor:pointer;">Save note</button>
          <button onclick="expandedNoteListId=null;renderListPickerItems()" style="
            background:transparent;border:1px solid #333;border-radius:8px;
            color:rgba(255,255,255,0.5);font-family:inherit;font-size:0.8rem;
            padding:8px 14px;cursor:pointer;">Cancel</button>
        </div>
      </div>
    ` : '';

    return `
      <div>
        <button onclick="${checked ? `expandListNote('${escJs(list.id)}')` : `toggleListItem('${escJs(list.id)}', '${escJs(listPickerKey)}')`}" style="
          display:flex;align-items:center;gap:12px;width:100%;
          background:transparent;border:none;padding:10px 20px;
          cursor:pointer;text-align:left;color:#fff;font-family:inherit;
          transition:background 0.1s;
        " onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'">
          <span style="
            width:18px;height:18px;border-radius:5px;flex-shrink:0;
            border:1.5px solid ${checked ? '#FEA219' : '#555'};
            background:${checked ? 'rgba(254,162,25,0.15)' : 'transparent'};
            display:flex;align-items:center;justify-content:center;
            font-size:0.7rem;color:#FEA219;
          " onclick="${checked ? `event.stopPropagation();toggleListItem('${escJs(list.id)}','${escJs(listPickerKey)}')` : ''}">${checked ? '✓' : ''}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:0.88rem;">${escHtmlInline(list.name)}</div>
            ${notePreview}
          </div>
          <span style="margin-left:auto;font-size:0.75rem;color:rgba(255,255,255,0.35);flex-shrink:0;">${list.keys.size}</span>
        </button>
        ${noteField}
      </div>
    `;
  }).join('');

  // Focus the note input if expanded, and wire Enter to save
  if (expandedNoteListId) {
    const input = document.getElementById(`note-input-${expandedNoteListId}`);
    if (input) {
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
      input.onkeydown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          saveListNote(expandedNoteListId, listPickerKey);
        }
      };
    }
  }
}

function expandListNote(listId) {
  expandedNoteListId = expandedNoteListId === listId ? null : listId;
  renderListPickerItems();
}

async function saveListNote(listId, restaurantKey) {
  const input = document.getElementById(`note-input-${listId}`);
  if (!input) return;
  const note = input.value.trim();
  const list = userLists.find(l => l.id === listId);
  if (!list) return;

  if (note) {
    list.notes.set(restaurantKey, note);
  } else {
    list.notes.delete(restaurantKey);
  }

  await sb.from('list_items')
    .update({ note: note || null })
    .eq('list_id', listId)
    .eq('restaurant_key', restaurantKey);

  closeListPicker();
}

async function toggleListItem(listId, restaurantKey) {
  const list = userLists.find(l => l.id === listId);
  if (!list) return;

  if (list.keys.has(restaurantKey)) {
    list.keys.delete(restaurantKey);
    list.notes.delete(restaurantKey);
    expandedNoteListId = null;
    await sb.from('list_items').delete()
      .eq('list_id', listId).eq('restaurant_key', restaurantKey);
  } else {
    list.keys.add(restaurantKey);
    await sb.from('list_items').upsert({ list_id: listId, restaurant_key: restaurantKey });
  }
  renderListPickerItems();
}

function showNewListForm() {
  document.getElementById('list-picker-new-btn').style.display  = 'none';
  document.getElementById('list-picker-new-form').style.display = 'block';
  document.getElementById('list-picker-new-input').focus();
}

function cancelNewList() {
  const input = document.getElementById('list-picker-new-input');
  if (input) input.value = '';
  const form = document.getElementById('list-picker-new-form');
  const btn  = document.getElementById('list-picker-new-btn');
  if (form) form.style.display = 'none';
  if (btn)  btn.style.display  = 'flex';
}

async function createAndAddToList() {
  const input = document.getElementById('list-picker-new-input');
  const name  = input.value.trim();
  if (!name || !currentUser) return;

  const slug = slugify(name);
  const { data: newList, error } = await sb.from('lists').insert({
    user_id: currentUser.id, name, slug, is_public: true,
  }).select().single();

  if (error || !newList) return;

  const keys = new Set([listPickerKey]);
  await sb.from('list_items').upsert({ list_id: newList.id, restaurant_key: listPickerKey });

  userLists.push({ id: newList.id, name: newList.name, slug: newList.slug, is_public: true, keys, notes: new Map() });
  cancelNewList();
  renderListPickerItems();
}

function slugify(name) {
  const base = name.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .trim()
    .replace(/\s+/g, '-')
    .slice(0, 40);
  const suffix = Math.random().toString(36).slice(2, 6);
  return `${base}-${suffix}`;
}

function escJs(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function escHtmlInline(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
